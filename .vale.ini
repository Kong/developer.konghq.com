StylesPath = .github/styles

# The minimum alert level to display (suggestion, warning, or error).
#
# CI builds will only fail on error-level alerts.
MinAlertLevel = suggestion

[formats]
mdx = md
yaml = md

# Specifies what Vale considers to be a boundary between words.
WordTemplate = \s(?:%s)\s


[*.md]
BasedOnStyles = base,docs
BlockIgnores = (\((http.*://|\.\/|\/).*?\)), \
(?s){% kgo_.*?%}.*?{% endkgo_.*?%}, \
(?s) *{%\s*entity_examples?\s*%}.*?{%\s*endentity_examples?\s*%}, \
(?s) *{%\s*mermaid\s*%}.*?{%\s*endmermaid\s*%}, \
(?s) *{%\s*table\s*%}.*?{%\s*endtable\s*%}, \
(?s) *{%\s*konnect_api_request\s*%}.*?{%\s*endkonnect_api_request\s*%}, \
(?s) *{%\s*control_plane_request\s*%}.*?{%\s*endcontrol_plane_request\s*%}, \
(?:)(\s*type\: github\n), \
(?:)(\s*key\: oss\n), \
(?:)(\s*include_content\: .*\n)

TokenIgnores = {%.*?%}, \
{{.*?}}, \
(?:)(/[A-Za-z0-9\-/_]*/), \
({\#.*})

[README.md]
BasedOnStyles = base,docs
base.Relativeurls = NO
base.We = NO
