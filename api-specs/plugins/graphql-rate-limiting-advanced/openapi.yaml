components:
  parameters:
    GraphQLCostDecorationId:
      description: ID of the GraphQL Cost Decoration to lookup
      example: ''
      in: path
      name: GraphQLCostDecorationId
      required: true
      schema:
        type: string
    PaginationOffset:
      allowEmptyValue: true
      description: >-
        Offset from which to return the next set of resources. Use the value of
        the 'offset' field from the response of a list operation as input here
        to paginate through all the resources
      in: query
      name: offset
      schema:
        type: string
    PaginationSize:
      description: Number of resources to be returned.
      in: query
      name: size
      schema:
        default: 100
        maximum: 1000
        minimum: 1
        type: integer
    PaginationTagsFilter:
      allowEmptyValue: true
      description: >-
        A list of tags to filter the list of resources on. Multiple tags can be
        concatenated using ',' to mean AND or using '/' to mean OR.
      example: tag1,tag2
      in: query
      name: tags
      schema:
        type: string
    ServiceIdOrName:
      description: ID or name of the Service to lookup
      example: 7fca84d6-7d37-4a74-a7b0-93e576089a41
      in: path
      name: ServiceIdOrName
      required: true
      schema:
        type: string
    Workspace:
      description: The name of the workspace
      in: path
      name: workspace
      required: true
      schema:
        default: default
        example: team-payments
        type: string
  responses:
    HTTP401Error:
      content:
        application/json:
          examples:
            DuplicateApiKey:
              summary: Duplicate API key found
              value:
                message: Duplicate API key found
                status: 401
            InvalidAuthCred:
              summary: Invalid authentication credentials
              value:
                message: Unauthorized
                status: 401
            NoAPIKey:
              summary: No API key found
              value:
                message: No API key found in request
                status: 401
          schema:
            $ref: '#/components/schemas/GatewayUnauthorizedError'
      description: Unauthorized
  schemas:
    GatewayUnauthorizedError:
      properties:
        message:
          type: string
        status:
          type: integer
      required:
        - message
        - status
      type: object
    GraphQLCostDecoration:
      additionalProperties: false
      properties:
        add_arguments:
          default: []
          items:
            type: string
          nullable: true
          type: array
        add_constant:
          default: 1
          nullable: true
          type: number
        created_at:
          description: Unix epoch when the resource was created.
          nullable: true
          type: integer
        id:
          description: A string representing a UUID (universally unique identifier).
          nullable: true
          type: string
        mul_arguments:
          default: []
          items:
            type: string
          nullable: true
          type: array
        mul_constant:
          default: 1
          nullable: true
          type: number
        service:
          nullable: true
          properties:
            id:
              type: string
          type: object
          x-foreign: true
        type_path:
          type: string
      required:
        - type_path
      type: object
    GraphQLCostDecorationWithoutParents:
      additionalProperties: false
      properties:
        add_arguments:
          default: []
          items:
            type: string
          nullable: true
          type: array
        add_constant:
          default: 1
          nullable: true
          type: number
        created_at:
          description: Unix epoch when the resource was created.
          nullable: true
          type: integer
        id:
          description: A string representing a UUID (universally unique identifier).
          nullable: true
          type: string
        mul_arguments:
          default: []
          items:
            type: string
          nullable: true
          type: array
        mul_constant:
          default: 1
          nullable: true
          type: number
        service:
          nullable: true
          properties:
            id:
              type: string
          type: object
          x-foreign: true
        type_path:
          type: string
      required:
        - type_path
      type: object
    PaginationNextResponse:
      description: URI to the next page (may be null)
      type: string
    PaginationOffsetResponse:
      description: >-
        Offset is used to paginate through the API. Provide this value to the
        next list operation to fetch the next page
      type: string
  securitySchemes:
    adminToken:
      in: header
      name: Kong-Admin-Token
      type: apiKey
