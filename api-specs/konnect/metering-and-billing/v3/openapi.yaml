        usage:
          description: The metered usage value for the period.
          type: string
          pattern: '^\-?[0-9]+(\.[0-9]+)?$'
        cost:
          description: |-
            The computed cost amount (usage × unit cost). Null when pricing is not available
            for the given combination of dimensions.
          type: string
          nullable: true
          pattern: '^\-?[0-9]+(\.[0-9]+)?$'
        currency:
          description: The currency code of the cost amount.
          type: string
          example: USD
          maxLength: 3
          minLength: 3
          pattern: '^[A-Z]{3}$'
        detail:
          description: |-
            Detail message when cost amount is null, explaining why the cost could not be
            resolved.
          type: string
        from:
          description: The start of the time bucket the value is aggregated over.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          title: RFC3339 Date-Time
        to:
