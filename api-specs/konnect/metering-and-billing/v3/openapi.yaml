          required: false
          schema:
            $ref: '#/components/schemas/SortQuery'
          explode: false
          style: form
        - name: filter
          in: query
          description: |-
            Filter features returned in the response.

            To filter features by meter_id add the following query param:
            filter[meter_id][oeq]=<id>
          required: false
          schema:
            $ref: '#/components/schemas/ListFeatureParamsFilter'
          style: deepObject
      responses:
        '200':
          description: Page paginated response.
          content:
            application/json:
