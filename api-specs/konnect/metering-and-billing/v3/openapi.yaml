                  type: string
                  example: 01G65Z755AFWAKHE12NY0CQ9FH
                  pattern: '^[0-7][0-9A-HJKMNP-TV-Z]{25}$'
                  title: ULID
              required:
                - id
            invoicing:
              description: The invoicing app used for this workflow.
              type: object
              additionalProperties: false
              properties:
                id:
                  description: The ID of the app.
