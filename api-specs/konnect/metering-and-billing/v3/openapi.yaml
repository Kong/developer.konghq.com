          maxLength: 64
          minLength: 1
          pattern: '^[a-z0-9]+(?:_[a-z0-9]+)*$'
          title: From plan phase
        max_quantity:
          description: |-
            The maximum number of times the add-on can be purchased for the plan. For
            single-instance add-ons this field must be omitted. For multi-instance add-ons
