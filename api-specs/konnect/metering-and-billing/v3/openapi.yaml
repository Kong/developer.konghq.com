    CreateMeterRequest:
      description: Meter create request.
      type: object
      properties:
        name:
          description: |-
            Display name of the resource.

            Between 1 and 256 characters.
          type: string
          maxLength: 256
          minLength: 1
        description:
          description: |-
            Optional description of the resource.

            Maximum 1024 characters.
          type: string
          maxLength: 1024
        labels:
          $ref: '#/components/schemas/Labels'
        key:
          $ref: '#/components/schemas/ResourceKey'
        aggregation:
          description: The aggregation type to use for the meter.
          type: string
          enum:
            - sum
            - count
            - unique_count
            - avg
            - min
            - max
            - latest
        event_type:
          description: The event type to include in the aggregation.
          type: string
          example: prompt
          minLength: 1
        events_from:
          description: |-
            The date since the meter should include events. Useful to skip old events. If
            not specified, all historical events are included.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          title: RFC3339 Date-Time
        value_property:
          description: |-
            JSONPath expression to extract the value from the ingested event's data
            property.

            The ingested value for sum, avg, min, and max aggregations is a number or a
            string that can be parsed to a number.

            For unique_count aggregation, the ingested value must be a string. For count
            aggregation the value_property is ignored.
          type: string
          example: $.tokens
          minLength: 1
        dimensions:
          description: |-
            Named JSONPath expressions to extract the group by values from the event data.

            Keys must be unique and consist only alphanumeric and underscore characters.
          type: object
          example:
            type: $.type
          additionalProperties:
            type: string
      additionalProperties: false
      required:
        - name
        - key
        - aggregation
        - event_type
    CreatePlanAddonRequest:
