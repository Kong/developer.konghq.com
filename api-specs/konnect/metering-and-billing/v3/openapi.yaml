    LLMCostOverrideCreate:
      description: |-
        Input for creating a per-namespace price override. Unique per provider, model
        and currency. If an override already exists for the given provider, model and
        currency, it will be updated. If an override does not exist, it will be created.
      type: object
      properties:
        provider:
          description: Provider/vendor of the model.
          type: string
        model_id:
          description: Canonical model identifier.
          type: string
        model_name:
          description: Human-readable model name.
          type: string
        pricing:
          description: Token pricing data.
          type: object
          additionalProperties: false
          properties:
            input_per_token:
              description: Input price per token (USD).
              type: string
              pattern: '^\-?[0-9]+(\.[0-9]+)?$'
            output_per_token:
              description: Output price per token (USD).
              type: string
              pattern: '^\-?[0-9]+(\.[0-9]+)?$'
            cache_read_per_token:
              description: Cache read price per token (USD).
              type: string
              pattern: '^\-?[0-9]+(\.[0-9]+)?$'
            cache_write_per_token:
              description: Cache write price per token (USD).
              type: string
              pattern: '^\-?[0-9]+(\.[0-9]+)?$'
            reasoning_per_token:
              description: Reasoning output price per token (USD).
              type: string
              pattern: '^\-?[0-9]+(\.[0-9]+)?$'
          required:
            - input_per_token
            - output_per_token
        currency:
          description: Currency code.
          type: string
          example: USD
          maxLength: 3
          minLength: 3
          pattern: '^[A-Z]{3}$'
        effective_from:
          description: When this override becomes effective.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          title: RFC3339 Date-Time
        effective_to:
          description: When this override expires.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          title: RFC3339 Date-Time
      additionalProperties: false
      required:
        - provider
        - model_id
        - pricing
        - currency
        - effective_from
    LLMCostPrice:
