    MeterQueryRequest:
      description: A meter query request.
      type: object
      properties:
        from:
          description: The start of the period the usage is queried from.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          title: RFC3339 Date-Time
        to:
          description: The end of the period the usage is queried to.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          title: RFC3339 Date-Time
        granularity:
          description: |-
            The size of the time buckets to group the usage into. If not specified, the
            usage is aggregated over the entire period.
          type: string
          enum:
            - PT1M
            - PT1H
            - P1D
            - P1M
        time_zone:
          description: |-
            The value is the name of the time zone as defined in the IANA Time Zone Database
            (http://www.iana.org/time-zones). The time zone is used to determine the start
            and end of the time buckets. If not specified, the UTC timezone will be used.
          type: string
          default: UTC
        group_by_dimensions:
          description: The dimensions to group the results by.
          type: array
          items:
            type: string
          example:
            - model
            - type
          maxItems: 100
        filters:
          description: Filters to apply to the query.
          type: object
          additionalProperties: false
          properties:
            dimensions:
              description: |-
                Filters to apply to the dimensions of the query. For `subject` and `customer_id`
                only equals ("eq", "in") comparisons are supported.
              type: object
              additionalProperties:
                $ref: '#/components/schemas/QueryFilterStringMapItem'
              maxProperties: 10
      example:
        from: '2023-01-01T00:00:00Z'
        to: '2023-01-02T00:00:00Z'
        granularity: P1D
        time_zone: UTC
      additionalProperties: false
    MeterQueryResult:
      description: Meter query result.
      type: object
      properties:
        from:
          description: The start of the period the usage is queried from.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          title: RFC3339 Date-Time
        to:
          description: The end of the period the usage is queried to.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          title: RFC3339 Date-Time
        data:
          description: 'The usage data. If no data is available, an empty array is returned.'
          type: array
          items:
            $ref: '#/components/schemas/MeterQueryRow'
      example:
        from: '2023-01-01T00:00:00Z'
        to: '2023-01-02T00:00:00Z'
        data:
          - value: '12.3456'
            from: '2023-01-01T00:00:00Z'
            to: '2023-01-02T00:00:00Z'
            dimensions:
              customer_id: 01G65Z755AFWAKHE12NY0CQ9FH
              model: gpt-4-turbo
              type: input
      additionalProperties: false
      required:
        - data
    MeterQueryRow:
      description: A row in the result of a meter query.
      type: object
      properties:
        value:
          description: The aggregated value.
          type: string
          pattern: '^\-?[0-9]+(\.[0-9]+)?$'
        from:
          description: The start of the time bucket the value is aggregated over.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          title: RFC3339 Date-Time
        to:
          description: The end of the time bucket the value is aggregated over.
          type: string
          format: date-time
          example: '2023-01-01T01:01:01.001Z'
          title: RFC3339 Date-Time
        dimensions:
          description: |-
            The dimensions the value is aggregated over. `subject` and `customer_id` are
            reserved dimensions.
          type: object
          additionalProperties:
            type: string
      example:
        value: '12.3456'
        from: '2023-01-01T00:00:00Z'
        to: '2023-01-02T00:00:00Z'
        dimensions:
          customer_id: 01G65Z755AFWAKHE12NY0CQ9FH
          model: gpt-4-turbo
          type: input
      additionalProperties: false
      required:
        - value
        - from
        - to
        - dimensions
