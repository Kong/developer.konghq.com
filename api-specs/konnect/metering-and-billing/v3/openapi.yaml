              type: string
          readOnly: true
          required:
            - id
            - name
        pricing:
          description: Token pricing data.
          type: object
          additionalProperties: false
          properties:
            input_per_token:
              description: Input price per token (USD).
              type: string
              pattern: '^\-?[0-9]+(\.[0-9]+)?$'
            output_per_token:
              description: Output price per token (USD).
              type: string
              pattern: '^\-?[0-9]+(\.[0-9]+)?$'
            cache_read_per_token:
              description: Cache read price per token (USD).
              type: string
              pattern: '^\-?[0-9]+(\.[0-9]+)?$'
            cache_write_per_token:
              description: Cache write price per token (USD).
              type: string
              pattern: '^\-?[0-9]+(\.[0-9]+)?$'
            reasoning_per_token:
