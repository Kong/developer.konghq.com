              pattern: '^\-?[0-9]+(\.[0-9]+)?$'
          readOnly: true
          required:
            - input_per_token
            - output_per_token
        currency:
          description: Currency code (currently always "USD").
          type: string
          example: USD
          maxLength: 3
          minLength: 3
          pattern: '^[A-Z]{3}$'
          readOnly: true
        source:
          description: Where this price came from.
