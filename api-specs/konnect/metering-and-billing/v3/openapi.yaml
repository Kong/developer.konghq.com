paths:
  /openmeter/addons:
    get:
      operationId: list-openmeter-addons
      summary: List add-ons
      description: |-
        **Pre-release Endpoint**
        This endpoint is currently in beta and is subject to change.

        List all add-ons.
      parameters:
        - $ref: '#/components/parameters/PagePaginationQuery'
        - name: sort
          in: query
          description: |-
            Sort add-ons returned in the response. Supported sort attributes are:

            - `id`
            - `key`
            - `name`
            - `created_at` (default)
            - `updated_at`

            The `asc` suffix is optional as the default sort order is ascending. The `desc`
            suffix is used to specify a descending order.
          required: false
          schema:
            $ref: '#/components/schemas/SortQuery'
          explode: false
          style: form
        - name: filter
          in: query
          description: Filter add-ons returned in the response.
          required: false
          schema:
            $ref: '#/components/schemas/ListAddonsParamsFilter'
          style: deepObject
      responses:
        '200':
          description: Page paginated response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddonPagePaginatedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      tags:
        - OpenMeter Product Catalog
    post:
      operationId: create-openmeter-addon
      summary: Create add-on
      description: |-
        **Pre-release Endpoint**
        This endpoint is currently in beta and is subject to change.

        Create a new add-on.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAddonRequest'
      responses:
        '201':
          description: Addon created response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Addon'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      tags:
        - OpenMeter Product Catalog
  '/openmeter/addons/{addonId}':
    put:
      operationId: update-openmeter-addon
