<div class="flex flex-1 flex-col gap-2">
  {% if include.label %}
  <span class="text-xs font-medium uppercase tracking-wide text-terciary">{{ include.label }}</span>
  {% endif %}
  <div class="dropdown-container w-full" data-skills-filter="{{ include.filter_key }}">
    <button
      type="button"
      class="group dropdown-trigger flex items-center justify-between gap-2 w-full rounded-md border border-primary/10 bg-secondary px-4 py-2 text-sm text-secondary"
      aria-expanded="false"
      aria-haspopup="true"
    >
      <span class="dropdown-label truncate">{{ include.default_label }}</span>
      <svg class="chevron-icon w-3 h-3 transition-transform group-aria-[expanded=true]:rotate-180" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
      </svg>
    </button>
    <ul class="dropdown-menu !w-auto min-w-full !left-0 !translate-x-0 !p-1 !gap-0 flex-col" aria-hidden="true" role="menu">
      <li>
        <button type="button" role="menuitem" data-value="" class="flex items-center justify-between gap-2 w-full text-left px-3 py-1.5 text-sm rounded hover:bg-hover-component/100 transition-colors">
          {{ include.default_label }}
          <svg class="w-3 h-3 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
        </button>
      </li>
      {% for item in include.items %}
      <li>
        <button type="button" role="menuitem" data-value="{{ item.value }}" class="flex items-center justify-between gap-2 w-full text-left px-3 py-1.5 text-sm rounded hover:bg-hover-component/100 transition-colors">
          {{ item.label }}
          <svg class="w-3 h-3 shrink-0 invisible" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
        </button>
      </li>
      {% endfor %}
    </ul>
  </div>
</div>
