<div class="flex flex-col gap-2 w-full">
  <div class="flex items-center gap-1 text-primary font-medium">
    <span>Compatible Protocols</span> 
    <a href="/gateway/entities/plugin/#protocols" aria-label="Learn more about compatible protocols" class="flex items-center">
      <span class="inline-block w-4 h-4 bg-current" style="mask: url('/assets/icons/help.svg') no-repeat center / contain" aria-hidden="true"></span>
    </a>
  </div>
  <div class="flex gap-1.5 flex-wrap">
    {% for protocol in include.protocols %}
    <span {% unless forloop.last %}class="after:content-[',']"{% endunless %}>{{ protocol }}</span>
    {% endfor %}
  </div>
</div>
