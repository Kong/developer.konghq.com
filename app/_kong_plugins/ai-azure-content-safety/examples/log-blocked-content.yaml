description: |
  Configure the AI Azure Content Safety plugin to log the raw content of blocked requests and responses.
  When a request or response is blocked, the original prompt or response body is captured in the
  Kong Gateway logs under `ai.proxy.azure-content-safety.input_faulty_prompt` and
  `ai.proxy.azure-content-safety.output_faulty_response`.

title: Log blocked request and response content

min_version:
  gateway: '3.14'

weight: 800

requirements:
  - You have an Azure subscription and access to Azure AI Content Safety.
  - You have enabled an [AI Proxy](/plugins/ai-proxy/) or [AI Proxy Advanced](/plugins/ai-proxy-advanced/) plugin.
  - You have enabled a [logging plugin](/plugins/?category=logging) such as [HTTP Log](/plugins/http-log/) or [File Log](/plugins/file-log/).

variables:
  content_safety_url:
    value: $CONTENT_SAFETY_URL
    description: The full URL of the Azure AI Content Safety instance.
  content_safety_key:
    value: $CONTENT_SAFETY_KEY
    description: The API key to access the Azure AI Content Safety instance.

config:
  content_safety_url: ${content_safety_url}
  content_safety_key: ${content_safety_key}
  categories:
    - name: Hate
      rejection_level: 2
    - name: Violence
      rejection_level: 2
  log_blocked_content: true

tools:
  - deck
  - admin-api
  - konnect-api
  - kic
  - terraform
