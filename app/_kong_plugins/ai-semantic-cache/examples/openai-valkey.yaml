title: 'Set up with OpenAI and Valkey'

description: 'Enable AI Semantic Caching with OpenAI embeddings API and a Valkey vector database.'

extended_description: |
  Enable AI Semantic Caching with OpenAI embeddings API and a Valkey vector database.

  Valkey is automatically detected when using the `redis` vectordb strategy. {{site.base_gateway}} queries the server and uses the Valkey-specific driver when it detects a Valkey backend.

  {:.info}
  > If you use the `text-embedding-ada-002` as an embedding model, you must set a fixed dimension of `1536`, as required by the official model specification. Alternatively, use the `text-embedding-3-small` model, which supports dynamic dimensions and works without specifying a fixed value.


weight: 899
requirements:
  - "The [AI Proxy](/plugins/ai-proxy/) or [AI Proxy Advanced](/plugins/ai-proxy-advanced/) plugin is enabled"
  - An OpenAI account
  - "A [Valkey](https://valkey.io/) 8.x instance."
  - "Port `6379`, or your custom Valkey port is open and reachable from {{site.base_gateway}}."

min_version:
  gateway: '3.14'

variables:
  header_value:
    value: $OPENAI_API_KEY
    description: Your OpenAI API key
  valkey_host:
    value: $VALKEY_HOST
    description: The host where your Valkey instance runs

config:
  embeddings:
    auth:
      header_name: Authorization
      header_value: Bearer ${header_value}
    model:
      provider: openai
      name: text-embedding-3-large
      options:
        upstream_url: https://api.openai.com/v1/embeddings
  vectordb:
    dimensions: 3072
    distance_metric: cosine
    strategy: redis
    threshold: 0.1
    redis:
      host: ${valkey_host}
      port: 6379

tools:
  - deck
  - admin-api
  - konnect-api
  - kic
  - terraform
