description: Protect your LLM services with model rate limiting.
extended_description: |
  Protect your LLM services with model rate limiting. 
  The AI Rate Limiting Advanced plugin will analyze query costs and token response 
  to provide an enterprise-grade rate limiting strategy.

  The following example uses GPT 4, but you can apply the same strategies to any LLM model.

title: 'Enable LLM model rate limiting'

requirements:
  - "[AI Proxy plugin](/plugins/ai-proxy/) or [AI Proxy Advanced plugin](/plugins/ai-proxy-advanced/) configured with an LLM service"

weight: 900

config:
  policies:
  - match: 
    - type: model
      values:
      - gpt-4
    limits:
      - limit: 1000
        window_size: 3600

tools:
  - deck
  - admin-api
  - konnect-api
  - kic
  - terraform

min_version:
  gateway: '3.14'