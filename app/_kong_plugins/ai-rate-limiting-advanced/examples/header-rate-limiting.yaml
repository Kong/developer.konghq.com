description: Protect your LLM services with header rate limiting.
extended_description: |
  Protect your LLM services with header rate limiting. 
  The AI Rate Limiting Advanced plugin will analyze query costs and token response 
  to provide an enterprise-grade rate limiting strategy.

  In this example, we're rate limiting based on a specific header value. The header name is specified in the [`config.policies.match.key`](/plugins/ai-rate-limiting-advanced/reference/#schema--config-policies-match-key) field, and the values in [`config.policies.match.value`](/plugins/ai-rate-limiting-advanced/reference/#schema--config-policies-match-values).

title: 'Enable rate limiting for a header'

requirements:
  - "[AI Proxy plugin](/plugins/ai-proxy/) or [AI Proxy Advanced plugin](/plugins/ai-proxy-advanced/) configured with an LLM service"

weight: 900

config:
  policies:
  - match:
    - type: header
      key: ${header_name}
      values:
      - ${header_value}
    limits:
      - limit: 100
        window_size: 60
      - limit: 1000
        window_size: 3600

variables:
  header_name:
    value: $HEADER_NAME
    description: The name of the header.
  header_value:
    value: $HEADER_VALUE
    description: The value of the header to rate limit.

tools:
  - deck
  - admin-api
  - konnect-api
  - kic
  - terraform

min_version:
  gateway: '3.14'