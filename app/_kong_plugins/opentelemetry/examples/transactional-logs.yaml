description: "Enables the OTEL plugin with an endpoint for API transactional logs."

extended_description: |
  Enables the OTEL plugin with an endpoint for API transactional logs using `access_logs.endpoint`.

  {:.info}
  > If you are running {{site.base_gateway}} in 3.13, use `access_logs_endpoint` instead of `access_logs.endpoint`.

title: 'Enable the OTEL plugin for transactional logs'

weight: 890

min_version:
  gateway: '3.14'

requirements: 
  - An OpenTelemetry backend

config:
  access_logs:
    endpoint: http://localhost:4318/v1/logs

tools:
  - deck
  - admin-api
  - konnect-api
  - kic
  - terraform