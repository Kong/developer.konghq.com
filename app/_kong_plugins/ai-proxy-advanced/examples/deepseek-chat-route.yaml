
title: 'Chat route with DeepSeek'
description: 'Configure a chat route using the DeepSeek Chat model.'

weight: 900

requirements:
- DeepSeek account

config:
  targets:
  - route_type: llm/v1/chat
    auth:
      header_name: Authorization
      header_value: Bearer ${key}
    model:
      provider: openai
      name: deepseek-chat
      options:
        upstream_url: https://api.deepseek.com/chat/completions
        max_tokens: 512
        temperature: 1.0
      
variables:
  key:
    value: $DEEPSEEK_API_KEY
    description: The API key to use to connect to DeepSeek.

tools:
  - deck
  - admin-api
  - konnect-api
  - kic
  - terraform
