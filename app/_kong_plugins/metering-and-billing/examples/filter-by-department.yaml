description: 'Attach department and project dimensions from request headers to every usage event.'
extended_description: |
  This example enriches usage events with `department` and `project` dimensions pulled from request headers. These attributes are included in the event data payload and can be used in Metering & Billing to apply tiered pricing rules, enforce per-department usage budgets, or produce internal chargeback reports.

  For example, a request with `x-department: engineering` and `x-project: search` produces an event containing `"department": "engineering"` and `"project": "search"` in its data. If a header is absent on a given request, that attribute is omitted from that event.

  To aggregate usage and generate invoices, you need either [{{site.konnect_short_name}} Metering & Billing](/metering-and-billing/) or a self-hosted [OpenMeter](https://openmeter.io/) instance.

title: 'Capture department and project as billing dimensions'

weight: 996

requirements:
  - 'Your API clients must pass `x-department` and `x-project` headers on requests you want to track by dimension. Requests without these headers emit events without those attributes.'
  - 'An authentication plugin (for example, [Key Auth](/plugins/key-auth/) or [JWT](/plugins/jwt/)) is configured on the same Gateway Service or Route so that a Consumer is present on each request. Requests without a Consumer will have their subject set to `unknown`.'
  - 'A [{{site.konnect_short_name}} system account token](/konnect-api/#system-accounts-and-access-tokens) (`spat_`) or OpenMeter API key to use as the `auth_token`.'

config:
  http_endpoint: https://us.api.konghq.com/v3/openmeter/events
  auth_token: ${auth-token}
  enable_api_requests: true
  enable_ai_llm: false
  subject:
    in: consumer
  attributes:
    - in: header
      key: x-department
      field: department
    - in: header
      key: x-project
      field: project

variables:
  auth-token:
    value: $AUTH_TOKEN
    description: A {{site.konnect_short_name}} system account token (`spat_`) or OpenMeter API key.

tools:
  - deck
  - admin-api
  - konnect-api
  - kic
  - terraform