description: 'Attach department and project dimensions from request headers to every usage event.'
extended_description: |
  This example enriches usage events with `department` and `project` dimensions pulled from request headers. 
  These attributes are included in the event data payload and can be used to apply tiered pricing rules, enforce per-department usage budgets, or produce internal chargeback reports.

  For example, a request with `x-department: engineering` and `x-project: search` produces an event containing `"department": "engineering"` and `"project": "search"` in its data. 
  If a header is absent on a given request, that attribute is omitted from that event.

  To aggregate usage and generate invoices, you need either [{{site.konnect_short_name}} Metering & Billing](/metering-and-billing/) or a self-hosted [OpenMeter](https://openmeter.io/) instance.

title: 'Capture department and project as billing dimensions'

weight: 996

requirements:
  - 'Your API clients must pass `x-department` and `x-project` headers on requests you want to track by dimension.'
  - 'An [authentication plugin](/plugins/?category=authentication) (for example, [Key Auth](/plugins/key-auth/) or [JWT](/plugins/jwt/)) is configured on the same Gateway Service or Route so that a Consumer is present on each request.'
  - 'A [{{site.konnect_short_name}} system account token](/konnect-api/#system-accounts-and-access-tokens) (`spat_`) or OpenMeter API key to use as the `auth_token`.'

config:
  ingest_endpoint: ${ingest-endpoint}
  api_token: ${auth-token}
  meter_api_requests: true
  meter_ai_token_usage: false
  subject:
    look_up_value_in: consumer
  attributes:
    - source: header
      look_up_value_in: x-department
      event_property_name: department
    - source: header
      look_up_value_in: x-project
      event_property_name: project

variables:
  auth-token:
    value: $AUTH_TOKEN
    description: A {{site.konnect_short_name}} system account token (`spat_`) or OpenMeter API key.
  ingest-endpoint: 
    value: $INGEST_ENDPOINT
    description: "Either the [{{site.konnect_short_name}} {{site.metering_and_billing}} ingest endpoint](/api/konnect/metering-and-billing/v3/#/operations/ingest-metering-events) (`https://us.api.konghq.com/v3/openmeter/events`) or the [OpenMeter self-hosted ingest endpoint](https://openmeter.io/docs/api/v3#tag/metering-events/POST/openmeter/events) (`https://127.0.0.1/api/v3/openmeter/events`)"

tools:
  - deck
  - admin-api
  - konnect-api
  - kic
  - terraform