description: 'Emit separate usage events for AI input and output tokens on AI Gateway requests, billed to the authenticated Kong Consumer.'
extended_description: |
  This example enables AI token metering. 
  For each AI Gateway request, the plugin emits two events: one for input (prompt) tokens and one for output (completion) tokens. 
  This allows you to price input and output independently.

  To aggregate usage and generate invoices, you need either [{{site.konnect_short_name}} Metering & Billing](/metering-and-billing/) or a self-hosted [OpenMeter](https://openmeter.io/) instance.

title: 'Meter AI input and output tokens'

weight: 998

requirements:
  - 'The [AI Proxy plugin](/plugins/ai-proxy/) is configured on the same Gateway Service or Route.'
  - 'An [authentication plugin](/plugins/?category=authentication) (for example, [Key Auth](/plugins/key-auth/) or [JWT](/plugins/jwt/)) is configured on the same Gateway Service or Route so that a Consumer is present on each request.'
  - 'A [{{site.konnect_short_name}} system account token](/konnect-api/#system-accounts-and-access-tokens) (`spat_`) or OpenMeter API key to use as the `auth_token`.'

config:
  ingest_endpoint: ${ingest-endpoint}
  api_token: ${auth-token}
  meter_api_requests: false
  meter_ai_token_usage: true
  subject:
    look_up_value_in: consumer

variables:
  auth-token:
    value: $AUTH_TOKEN
    description: A {{site.konnect_short_name}} system account token (`spat_`) or OpenMeter API key.
  ingest-endpoint: 
    value: $INGEST_ENDPOINT
    description: "Either the [{{site.konnect_short_name}} {{site.metering_and_billing}} ingest endpoint](/api/konnect/metering-and-billing/v3/#/operations/ingest-metering-events) (`https://us.api.konghq.com/v3/openmeter/events`) or the [OpenMeter self-hosted ingest endpoint](https://openmeter.io/docs/api/v3#tag/metering-events/POST/openmeter/events) (`https://127.0.0.1/api/v3/openmeter/events`)"

tools:
  - deck
  - admin-api
  - konnect-api
  - kic
  - terraform
