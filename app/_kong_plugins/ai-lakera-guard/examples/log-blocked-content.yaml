description: |
  Configure the AI Lakera Guard plugin to log the raw content of blocked requests and responses.
  When a request or response is blocked, the original prompt or response body is captured in the
  Kong Gateway logs under `ai.proxy.lakera-guard.input_faulty_prompt` and
  `ai.proxy.lakera-guard.output_faulty_response`.

title: Log blocked request and response content

min_version:
  gateway: '3.14'

weight: 800

requirements:
  - You have a Lakera account and an API key.
  - You have enabled an [AI Proxy](/plugins/ai-proxy/) or [AI Proxy Advanced](/plugins/ai-proxy-advanced/) plugin.
  - You have enabled a [logging plugin](/plugins/?category=logging) such as [HTTP Log](/plugins/http-log/) or [File Log](/plugins/file-log/).

variables:
  lakera_api_key:
    description: The API key for your Lakera account.
    value: $LAKERA_API_KEY

config:
  api_key: ${lakera_api_key}
  log_blocked_content: true

tools:
  - deck
  - admin-api
  - konnect-api
  - kic
  - terraform
