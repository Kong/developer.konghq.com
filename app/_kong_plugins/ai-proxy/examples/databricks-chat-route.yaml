
title: 'Chat route with Databricks'
description: 'Configure a chat route using the Databricks GPT OSS 20B model.'

weight: 900
min_version:
  gateway: '3.14'

requirements:
- Databricks account

config:
  route_type: llm/v1/chat
  auth:
    header_name: Authorization
    header_value: Bearer ${key}
  model:
    provider: databricks
    name: databricks-gpt-oss-20b
    options:
      databricks:
        workspace_instance_id: ${workspace}

variables:
  key:
    value: $DATABRICKS_TOKEN
    description: The Databricks personal access token.
  workspace:
    value: $DATABRICKS_WORKSPACE_INSTANCE_ID
    description: The Databricks workspace instance ID.

tools:
  - deck
  - admin-api
  - konnect-api
  - kic
  - terraform
