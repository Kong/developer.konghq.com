description: |
  Configure the AI AWS Guardrails plugin to log the raw content of blocked requests and responses.
  When a request or response is blocked, the original prompt or response body is captured in the
  Kong Gateway logs under `ai.proxy.aws-guardrails.input_faulty_prompt` and
  `ai.proxy.aws-guardrails.output_faulty_response`.

title: Log blocked request and response content

min_version:
  gateway: '3.14'

weight: 800

requirements:
  - You have an AWS Bedrock Guardrails policy and access to AWS Bedrock Guardrails service.
  - You have enabled an [AI Proxy](/plugins/ai-proxy/) or [AI Proxy Advanced](/plugins/ai-proxy-advanced/) plugin.
  - You have enabled a [logging plugin](/plugins/?category=logging) such as [HTTP Log](/plugins/http-log/) or [File Log](/plugins/file-log/).

variables:
  guardrails_id:
    description: The guardrail identifier used in the request to apply the guardrail
    value: $GUARDRAILS_ID
  guardrails_version:
    description: The guardrail version used in the request to apply the guardrail
    value: $GUARDRAILS_VERSION
  aws_region:
    description: The AWS region where the guardrail is deployed
    value: $AWS_REGION
  aws_access_key_id:
    description: The AWS access key ID used to authenticate the request
    value: $AWS_ACCESS_KEY_ID
  aws_secret_access_key:
    description: The AWS secret access key used to authenticate the request
    value: $AWS_SECRET_ACCESS_KEY

config:
  guardrails_id: ${guardrails_id}
  guardrails_version: ${guardrails_version}
  aws_region: ${aws_region}
  aws_access_key_id: ${aws_access_key_id}
  aws_secret_access_key: ${aws_secret_access_key}
  log_blocked_content: true

tools:
  - deck
  - admin-api
  - konnect-api
  - kic
  - terraform
