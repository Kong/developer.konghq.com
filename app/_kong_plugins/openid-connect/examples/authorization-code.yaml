title: Authorization code flow
description: |
  This example configures the OpenID Connect plugin with an authorization code flow.

extended_description: |
  This example configures the OpenID Connect plugin with an authorization code flow.

  Here's how the auth code flow works:

  {% include_cached plugins/oidc/diagrams/auth-code.md %}

  You can use either:
  
  - An {{ site.identity }} authorization server hosted on {{ site.konnect_short_name }}.
  - An external authorization server like Keycloak. For a full example that shows you how to set up the authorization code flow with Keycloak,
  see [Configure OpenID Connect with the auth code flow](/how-to/configure-oidc-with-auth-code-flow/).

  {% include_cached plugins/oidc/client-auth.md %}

  {% entity_example %}
  type: plugin
  data:
    name: openid-connect
    config:
      issuer: ${issuer}
      client_id:
        - ${client-id}
      client_secret:
        - ${client-secret}
      client_auth:
        - client_secret_post
      auth_methods:
        - authorization_code
        - session
      response_mode: form_post
      preserve_query_args: true
      login_action: redirect
      login_tokens: null
      principals:
        enabled: true
        directory: ${directory-name}
  {% endentity_example %}

weight: 900

requirements:
  - A configured identity provider (IdP)

config:
  issuer: ${issuer}
  client_id:
    - ${client-id}
  client_secret:
    - ${client-secret}
  client_auth:
    - client_secret_post
  auth_methods:
    - authorization_code
    - session
  
  response_mode: form_post
  preserve_query_args: true
  login_action: redirect
  login_tokens: null
  principals:
    enabled: true
    directory: ${directory-name}

variables:
  issuer:
    value: $ISSUER
    description: |
      The issuer authentication URL for your IdP. As this example uses Kong Identity as the IdP, the issuer URL should look like `https://xxx.<region>.identity.konghq.tech/auth`. If you're using Keycloak, the issuer URL looks like this: `http://localhost:8080/realms/example-realm`
  client-id:
    value: $CLIENT_ID
    description: The client ID that the plugin uses when it calls authenticated endpoints of the IdP.
  client-secret:
    value: $CLIENT_SECRET
    description: The client secret needed to connect to your IdP.
  directory-name:
    value: $DIRECTORY_NAME
    description: When using {{ site.identity }} as your IdP, the name of the directory used for principals lookup.

tools:
  - deck
  - admin-api
  - konnect-api
  - kic
  - terraform

group: authentication