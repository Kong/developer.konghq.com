title: Authorization code flow
description: |
  This example configures the OpenID Connect plugin with an authorization code flow.

extended_description: |
  This example configures the OpenID Connect plugin with an authorization code flow.

  Here's how the auth code flow works:

  {% include_cached plugins/oidc/diagrams/auth-code.md %}

  {% include_cached plugins/oidc/identity-server-intro.md %}
  To use an external authorization server like Keycloak,
  see [Configure OpenID Connect with the auth code flow](/how-to/configure-oidc-with-auth-code-flow/).

  {% include_cached plugins/oidc/client-auth.md %}

  {% entity_example %}
  type: plugin
  data:
    name: openid-connect
    config:
      issuer: ${issuer}
      client_id:
        - ${client-id}
      client_secret:
        - ${client-secret}
      client_auth:
        - client_secret_post
      auth_methods:
        - authorization_code
        - session
      response_mode: form_post
      preserve_query_args: true
      login_action: redirect
      login_tokens: null
      principals:
        enabled: true
        directory: ${directory-name}
  {% endentity_example %}

weight: 900

requirements:
  - "{% include_cached plugins/oidc/idp-requirement.md %}"
  - "A {{site.identity}} principal [configured with an OIDC identity](/identity/principals/#openid-connect)"

config:
  issuer: ${issuer}
  client_id:
    - ${client-id}
  client_secret:
    - ${client-secret}
  client_auth:
    - client_secret_post
  auth_methods:
    - authorization_code
    - session
  
  response_mode: form_post
  preserve_query_args: true
  login_action: redirect
  login_tokens: null
  principals:
    enabled: true
    directory: ${directory-name}

variables:
  issuer:
    value: $ISSUER
    description: |
      The issuer authentication URL for your IdP. Since this example uses {{site.identity}} as the IdP, the auth server issuer URL should look like `https://xxx.<region>.identity.konghq.tech/auth`.
  client-id:
    value: $CLIENT_ID
    description: The client ID that the plugin uses when it calls authenticated endpoints of the IdP.
  client-secret:
    value: $CLIENT_SECRET
    description: The client secret needed to connect to your IdP.
  directory-name:
    value: $DIRECTORY_NAME
    description: The name of the {{ site.identity }} directory used for principals lookup.

tools:
  - deck
  - admin-api
  - konnect-api
  - kic
  - terraform

group: authentication