description: 'Authenticate to a Solace broker using OAuth 2.0 client credentials. {{site.base_gateway}} fetches and renews access tokens automatically.'

title: 'OAuth 2.0 client credentials authentication'

weight: 900

min_version:
  gateway: '3.15'

requirements:
  - "[Solace installed](https://docs.solace.com/API/API-Developer-Guide/Installation.htm) and running"
  - "An OAuth 2.0 identity provider that supports the client credentials grant"
  - "The Solace broker configured to accept OAuth 2.0 tokens"

variables:
  host:
    description: 'The [IPv4 or IPv6 address or hostname](https://docs.solace.com/API-Developer-Online-Ref-Documentation/c/index.html#host-entry) of the Solace broker. Use a TLS listener, for example `tcps://127.0.0.1:55443`.'
    value: SOLACE_HOST
  topic:
    description: 'The name of the Solace topic to publish to.'
    value: SOLACE_TOPIC
  token_endpoint:
    description: 'The URL of the OAuth 2.0 token endpoint.'
    value: $TOKEN_ENDPOINT_URL
  client_id:
    description: 'The OAuth 2.0 client ID.'
    value: $CLIENT_ID
  client_secret:
    description: 'The OAuth 2.0 client secret.'
    value: $CLIENT_SECRET

config:
  session:
    host: ${host}
    vpn_name: default
    ssl_validate_certificate: true
    authentication:
      scheme: CLIENT_CREDENTIALS
      client_credentials:
        token_endpoint: ${token_endpoint}
        client_id: ${client_id}
        client_secret: ${client_secret}
        eagerly_expire: 5
  message:
    destinations:
      - name: ${topic}
        type: TOPIC
    delivery_mode: DIRECT

tools:
  - deck
  - admin-api
  - konnect-api
  - kic
  - terraform
