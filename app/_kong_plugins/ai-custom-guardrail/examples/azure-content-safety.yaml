description: |
  Configure the AI Custom Guardrail plugin to check requests and responses, and block content matching harm categories defined by Azure.

extended_description: |
  Configure the plugin to block request and response content matching the `Hate` and `Violence` categories [defined by Azure](https://learn.microsoft.com/en-us/azure/ai-services/content-safety/concepts/harm-categories?tabs=warning).

     

title: Block request and response content using Azure Content Safety

weight: 900

requirements:
  - You have an Azure subscription and access to Azure AI Content Safety.
  - You have enabled an [AI Proxy](/plugins/ai-proxy/) or [AI Proxy Advanced](/plugins/ai-proxy-advanced/) plugin.

variables:
  content_safety_url:
    value: $CONTENT_SAFETY_URL
    description: The full URL of the Azure AI Content Safety instance.
  content_safety_key:
    value: $CONTENT_SAFETY_KEY
    description: The API key to access the Azure AI Content Safety instance.
  

config: 
  params:
    content_safety_url: ${content_safety_url}
    content_safety_key: ${content_safety_key}
  request:
    url: '${conf.params.content_safety_url}'
    headers: 
      Ocp-Apim-Subscription-Key: '$(conf.params.content_safety_key)'
    body:
      categories: '[{ \"name\": \"Hate\", \"rejection_level\": 2}, { \"name\": \"Violence\", \"rejection_level\": 2}]'
    response:
      block: '$(check_response.block)'
      block_message: '$(check_response.block_message)'
    functions:
      check_response: |
        [[return function(resp, conf)
              local res = {
                block = true,
                block_message = "content passed safety check",
              }

              if
                ((type(resp.categoriesAnalysis) ~= "table") or (#resp.categoriesAnalysis == 0))
                and ((type(resp.blocklistsMatch) ~= "table") or (#resp.blocklistsMatch == 0))
              then
                return res, "content safety introspection is invalid"
              end

              local reason = ""
              local ok = true

              for _, v in ipairs(resp.categoriesAnalysis or EMPTY_T) do
                local category_name = v.category
                local failure_level = nil
                for _, category in ipairs(conf.params.categories or {}) do
                  if category.name == category_name then
                    failure_level = category.rejection_level
                    break
                  end
                end

                if failure_level and (v.severity >= failure_level) then
                  -- hack to prevent adding '; ' to the end of a single-cat failure
                  if not ok then
                    reason = reason .. "; "
                  end

                  ok = false
                  reason = reason .. "breached category [" .. category_name .. "] at level " .. failure_level
                end -- else just ignore it, we didn't define a failure threshold
              end

              for _, v in ipairs(resp.blocklistsMatch or EMPTY_T) do
                local blocklist_name = v.blocklistName or "unknown_name"

                ok = false
                reason = reason .. "breached blocklist [" .. blocklist_name .. "]"
              end

              return {
                block = not ok,
                block_message = reason,
              }
            end]]
  guarding_mode: BOTH

tools:
  - deck
  - admin-api
  - konnect-api
  - kic
  - terraform

min_version:
  gateway: '3.12'