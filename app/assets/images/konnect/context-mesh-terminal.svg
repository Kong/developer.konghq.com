<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 540" role="img" aria-labelledby="cc-title cc-desc" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">
  <title id="cc-title">Claude Code terminal session calling an OpenWeather MCP server</title>
  <desc id="cc-desc">A dark-mode terminal window showing Claude Code answering a weather question by calling the get_current_weather tool on an MCP server, returning conditions for San Francisco.</desc>

  <defs>
    <clipPath id="window-clip">
      <rect x="20" y="20" width="780" height="500" rx="10"/>
    </clipPath>
  </defs>

  <rect x="20" y="20" width="780" height="500" rx="10" fill="#0f1419"/>

  <rect x="20" y="20" width="780" height="34" rx="10" fill="#1a1f2a" clip-path="url(#window-clip)"/>
  <rect x="20" y="44" width="780" height="10" fill="#1a1f2a"/>

  <circle cx="42" cy="37" r="6" fill="#ff5f57"/>
  <circle cx="62" cy="37" r="6" fill="#febc2e"/>
  <circle cx="82" cy="37" r="6" fill="#28c840"/>

  <text x="410" y="41" text-anchor="middle" font-size="12" fill="#6b7785">claude-code . zsh</text>

  <text x="40" y="84" font-size="13" fill="#7a8290">$ claude</text>

  <text x="40" y="112" font-size="13" fill="#d4905a">●</text>
  <text x="58" y="112" font-size="13" fill="#a8b3c1">Claude Code v1.4.2</text>
  <text x="40" y="130" font-size="12" fill="#6b7785">connected to 2 MCP servers: openweather, slack</text>

  <text x="40" y="162" font-size="13" fill="#5e9eff">&gt;</text>
  <text x="58" y="162" font-size="13" fill="#e6edf3">what's the weather in San Francisco right now? should I bring a jacket</text>
  <text x="58" y="180" font-size="13" fill="#e6edf3">to my 6pm meeting downtown?</text>

  <text x="40" y="212" font-size="13" fill="#9b7fd9">⏺</text>
  <text x="58" y="212" font-size="13" fill="#a8b3c1">I'll check current conditions in San Francisco.</text>

  <rect x="40" y="230" width="740" height="92" rx="6" fill="#161b24" stroke="#2a3340" stroke-width="1"/>
  <text x="54" y="250" font-size="12" fill="#6b7785">▾</text>
  <text x="72" y="250" font-size="12" fill="#7fb96e">openweather</text>
  <text x="148" y="250" font-size="12" fill="#6b7785">·</text>
  <text x="160" y="250" font-size="12" fill="#a8b3c1">get_current_weather</text>
  <text x="54" y="272" font-size="11" fill="#6b7785">  params  </text>
  <text x="130" y="272" font-size="11" fill="#c9d3df">{ city: "San Francisco", units: "imperial" }</text>
  <text x="54" y="292" font-size="11" fill="#6b7785">  result  </text>
  <text x="130" y="292" font-size="11" fill="#c9d3df">{ temp: 58, feels_like: 54, conditions: "Overcast",</text>
  <text x="130" y="308" font-size="11" fill="#c9d3df">    wind: "12 mph WSW", humidity: 78, sunset: "18:42" }</text>

  <text x="40" y="346" font-size="13" fill="#9b7fd9">⏺</text>
  <text x="58" y="346" font-size="13" fill="#e6edf3">Currently 58°F in San Francisco, overcast, feeling closer to 54°F</text>
  <text x="58" y="364" font-size="13" fill="#e6edf3">with a 12 mph wind out of the west-southwest. Sunset is at 6:42 PM,</text>
  <text x="58" y="382" font-size="13" fill="#e6edf3">so it'll be cooling further during your meeting.</text>
  <text x="58" y="406" font-size="13" fill="#e6edf3">Yes, bring a jacket. A light layer would handle the temperature,</text>
  <text x="58" y="424" font-size="13" fill="#e6edf3">but the wind will make it feel sharper near the coast or in shaded</text>
  <text x="58" y="442" font-size="13" fill="#e6edf3">streets between buildings.</text>

  <rect x="40" y="466" width="740" height="34" rx="6" fill="#161b24" stroke="#2a3340" stroke-width="1"/>
  <text x="54" y="488" font-size="13" fill="#5e9eff">&gt;</text>
  <text x="72" y="488" font-size="13" fill="#4a5460">type a follow-up message</text>
  <rect x="220" y="476" width="2" height="16" fill="#5e9eff">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>