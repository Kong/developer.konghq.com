<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadowProv" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="0.5" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Main server container with refined shape -->
  <rect x="8" y="8" width="8" height="8" rx="1.5" fill="#428CDC" filter="url(#shadowProv)"/>

  <!-- Server detail lines (horizontal stack) -->
  <g stroke="white" stroke-width="1.2" stroke-linecap="round">
    <line x1="10" y1="10" x2="14" y2="10"/>
    <line x1="10" y1="12" x2="14" y2="12"/>
    <line x1="10" y1="14" x2="14" y2="14"/>
  </g>

  <!-- Status indicators (right side circles) -->
  <circle cx="15.5" cy="10" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="15.5" cy="12" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="15.5" cy="14" r="0.8" fill="white" opacity="0.6"/>

  <!-- Connection endpoints (4 directions) with nodes -->
  <g filter="url(#shadowProv)">
    <!-- Top -->
    <circle cx="12" cy="2" r="1.8" fill="#428CDC"/>
    <!-- Left -->
    <circle cx="2" cy="12" r="1.8" fill="#428CDC"/>
    <!-- Right -->
    <circle cx="22" cy="12" r="1.8" fill="#428CDC"/>
    <!-- Bottom -->
    <circle cx="12" cy="22" r="1.8" fill="#428CDC"/>
  </g>

  <!-- Connection lines with proper endpoints -->
  <g stroke="#428CDC" stroke-width="1.6" stroke-linecap="round">
    <!-- Top -->
    <path d="M12 3.8L12 8" stroke-width="1.6"/>
    <!-- Left -->
    <path d="M3.8 12L8 12" stroke-width="1.6"/>
    <!-- Right -->
    <path d="M16 12L20.2 12" stroke-width="1.6"/>
    <!-- Bottom -->
    <path d="M12 16L12 20.2" stroke-width="1.6"/>
  </g>

  <!-- Subtle glow effect around main box -->
  <rect x="8" y="8" width="8" height="8" rx="1.5" fill="none" stroke="#428CDC" stroke-width="0.6" opacity="0.2"/>
</svg>
