definitions:
  - term: Admin
    description: |
      An admin is a Kong Gateway user account capable of accessing the Admin API or Kong Manager.
    url: |
      [Admin entity](/gateway/entities/admin/)
  - term: Beta
    description: A functionality of a feature or release version is of high quality and can be used in a **non-production** environment.
    url: |
      [Stages of software availability](/stages-of-software-availability/#beta)
  - term: Consumer
    description: |
      A Consumer object represents the client of a Service. 
    url: |
      [Consumer entity](/gateway/entities/consumer/)
  - term: Credential
    description: |
      A unique string associated with a Consumer, for example, an API key.
    url: |
      [Consumer entity](/gateway/entities/consumer/#what-are-credentials-and-why-do-i-need-them)
  - term: Dev Portal
    description: |
      A web application that functions as a collection of API products, specs, and documentation objects. 
      The purpose of a Dev Portal is to allow registration and consumption of services running through Kong to other teams, developers, and partners.
    url: |
      [Dev Portal](/dev-portal/)
  - term: Groups
    description: |
      Sets of role-defined entities.
    url: |
      [Group entity](/gateway/entities/group/)
  - term: Kong plugin or bundled plugin
    description: |
      A plugin developed, maintained, and supported by Kong. 
      Unless otherwise noted in the plugin's description on the Kong Plugin Hub, all Kong-supported plugins are bundled with their relevant Kong Gateway install packages, and are available in Konnect.
    url: |
      [Plugins bundled in self-managed Kong Gateway](/plugins/?deployment-topology=on-prem&support=kong-inc)
      <br><br>
      [Plugins bundled in Konnect](/plugins/?deployment-topology=konnect&support=kong-inc)
  - term: Permissions
    description: |
      A permission is a policy representing the ability to create, read, update, or delete an Admin API entity defined by endpoints.
      Permissions are a self-managed Kong Gateway Enterprise concept. 
    url: |
      [RBAC entity](/gateway/entities/rbac/)
  - term: Insomnia plugin
    description: |
      Insomnia plugins can be used to extend the functionality of Insomnia with advanced features and customizable themes.
    url: |
      [Insomnia plugins](/insomnia/plugins/)
  - term: Kong Gateway Community Edition
    description: |
      A deprecated term for Kong Gateway Open-Source (OSS).
    url: |
      N/A
  - term: Kong Gateway plugin
    description: |
      Kong Gateway plugins provide advanced functionality and extend the use of Kong Gateway, allowing you to add new features to your gateway. 
      Plugins can be configured to run in a variety of contexts, ranging from a specific Route to all upstreams. Plugins can perform operations in your environment, such as authentication, rate limiting, or transformations on a proxied request.
    url: |
      [Plugin entity](/gateway/entities/plugin/)
      <br><br>
      [Plugin Hub](/plugins/)
  - term: Mesh policy
    description: |
      Mesh policies bundle features for your service traffic and network configuration.
    url: |
      [Mesh policies](/mesh/policies/)
  - term: Event Gateway policy
    description: |
      In Event Gateway, policies can be used to intercept client connections and transform messages between the client and the broker.
    url: |
      [Event Gateway policies](/event-gateway/policies/)
  - term: Role
    description: |
      A role is a set of permissions that may be reused and assigned to admins and users.
    url: |
      [Roles in self-managed Kong Gateway](/gateway/entities/rbac/)
      <br><br>
      [Roles in Konnect](/konnect-platform/teams-and-roles/#roles)
  - term: Route
    description: |
      A Route defines rules to match client requests to upstream services. 
      Each Route is associated with a Gateway Service, and a Service may have multiple Routes associated with it.
    url: |
      [Route entity](/gateway/entities/route/)
  - term: Gateway Service
    description: |
      Gateway Services represent the upstream services in your system. These applications are the business logic components of your system responsible for responding to requests.
    url: |
      [Gateway Service entity](/gateway/entities/service/)
  - term: "{{site.konnect_catalog}} service"
    description: |
      A {{site.konnect_catalog}} service in Konnect represents a service running within your organization.
      Each {{site.konnect_catalog}} service aggregates both internal tools, like Gateway and Mesh Services, and external integrations,
      like GitHub repositories and Slack webhooks.
    url: |
      [{{site.konnect_catalog}}](/catalog/)
  - term: Super admin
    description: |
      A super admin is a specialized role in self-managed Kong Gateway that manages Workspaces, admins, roles, and customizes permissions.
    url: |
      [Create a super admin](/how-to/create-a-super-admin/)
  - term: Teams
    description: |
      Teams organize developers into working groups.
    url: |
      [Teams in self-managed Kong Gateway](/gateway/entities/rbac/)
      <br><br>
      [Teams in Konnect](/konnect-platform/teams-and-roles/#teams)
  - term: Upstream service
    description: |
      An instance of your own application, usually running behind Kong Gateway, Mesh, etc.
      Also referred to as an upstream application, service application, or backend service.
    url: |
      N/A
  - term: Tech preview
    description: |
      An early-stage, experimental feature that **should not** be used in a production environment. Some products or projects may also call this stage *alpha*.
    url: |
      [Stages of software availability](/stages-of-software-availability/#tech-preview)
  - term: Premium partner plugin
    description: |
      A third-party custom plugin that has been validated by Kong and meets certain standards. 
      Although these plugins are developed, tested, and maintained by an external developer, the plugin owner also ensures the plugin's version compatibility with Kong Gateway.
    url: |
      [Premium partners](/premium-partners/)
  - term: Third-party or community plugin
    description: |
      A custom plugin developed, maintained, and supported by an external developer, not by Kong. 
      Unless explicitly labeled as a premium partner, Kong does not test these plugins or maintain their version compatibility. 
      If you need any support with these plugins, contact the maintainer directly.
    url: |
      [Third-party plugins](/plugins/?support=third-party)
  - term: Upstream
    description: |
      An Upstream enables load balancing by providing a virtual hostname and collection of Targets, or upstream service instances, to which client requests are forwarded.
    url: |
      [Upstream entity](/gateway/entities/upstream/)
  - term: Workspace
    description: |
      Workspaces enable an organization to segment objects and admins into namespaces.
      The segmentation allows teams of admins sharing the same Kong Gateway cluster to adopt roles for interacting with specific objects.
      <br><br>
      Workspaces are available in self-managed Kong Gateway Enterprise only. 
      When running Kong Gateway in Konnect, entity and user segmentation is handled through Control Planes and Control Plane Groups.
    url: |
      [Workspace entity](/gateway/entities/workspace/)

metering_and_billing:
  - category: Metering
    definitions:
      - term: Metering
        description: |
          Real-time event-based usage metering to aggregate consumption over time precisely.
        url: "N/A"
      - term: Usage
        description: |
          The consumption of a product or service measured through events and aggregated over time.
        url: "N/A"
      - term: Billable Event
        description: |
          The smallest unit of work that can be billed.
        url: "N/A"
  - category: Pricing
    definitions:
      - term: Packaging
        description: |
          The process of bundling products and services together.
        url: "N/A"
      - term: Recurring Pricing
        description: |
          A pricing model where customers pay for products or services on a recurring basis.
        url: "N/A"
      - term: Seat-Based Pricing
        description: |
          A pricing model where a customer pays for a product or service based on the number of seats.
        url: "N/A"
      - term: Usage-Based Pricing
        description: |
          A pricing model where a customer pays for a product or service based on their usage.
        url: "N/A"
      - term: Credit-Based Pricing
        description: |
          A pricing model where a customer pays for a product or service based on the number of credits.
        url: "N/A"
      - term: Outcome-Based Pricing
        description: |
          A pricing model where a customer pays for a product or service based on the outcome.
        url: "N/A"
      - term: Hybrid Pricing
        description: |
          Hybrid pricing models have recurring and usage-based components.
        url: "N/A"
      - term: Value Metric
        description: |
          The unit of measurement that determines how a product or service is priced based on customer value received.
        url: "N/A"
  - category: Pricing Models
    definitions:
      - term: Per-Unit Pricing
        description: |
          A pricing model where a customer pays for a product or service based on the amount of units consumed.
        url: "N/A"
      - term: Overage Pricing
        description: |
          Overage pricing is paid by the customer when they exceed their pre-defined usage limit.
        url: "N/A"
      - term: Tiered Pricing
        description: |
          Tiered Pricing is a model where fees vary between usage levels.
        url: "N/A"
      - term: Graduated Pricing
        description: |
          A pricing model where a product or service is priced differently based on the quantity purchased.
        url: "N/A"
      - term: Volume Pricing
        description: |
          Volume pricing is a model where you charge customers based on the highest achieved tier.
        url: "N/A"
  - category: Billing
    definitions:
      - term: Add-On
        description: |
          An add-on is a product or service that is added to a subscription.
        url: "N/A"
      - term: Billing Anchor
        description: |
          The specific day of the month or time period that determines when a customer's billing cycle starts and ends.
        url: "N/A"
      - term: Commitments
        description: |
          Commitments can be used to cover vendor upfront costs and create a more predictable revenue stream.
        url: "N/A"
      - term: Entitlements
        description: |
          Entitlements are the rules that determine what a customer is entitled to.
        url: "N/A"
      - term: Grandfathering
        description: |
          Grandfathering means to keep existing customers on the old pricing model while applying new pricing to new customers.
        url: "N/A"
      - term: Paid In Advance
        description: |
          Paid in advance is a billing model where a customer pays for a product or service in advance.
        url: "N/A"
      - term: Paid In Arrears
        description: |
          Paid in arrears is a billing model where a customer pays for a product or service after it has been used.
        url: "N/A"
      - term: Payment Terms
        description: |
          The conditions and timeframes under which a customer must pay for products or services.
        url: "N/A"
      - term: Paywall
        description: |
          A digital barrier that restricts access to content or features until users pay or subscribe.
        url: "N/A"
      - term: Progressive Billing
        description: |
          With progressive billing, vendors set invoicing thresholds, and customers are billed when limits are reached.
        url: "N/A"
      - term: Proration
        description: |
          The calculation of partial charges when changes occur mid-billing cycle.
        url: "N/A"
      - term: Reverse Trial
        description: |
          A reverse trial is a trial period where the customer has access to premium features before the trial period ends.
        url: "N/A"
      - term: Utilization
        description: |
          The measure of how much a customer uses a product, feature or service compared to their purchased capacity or limits.
        url: "N/A"
  - category: Payment
    definitions:
      - term: Dunning
        description: |
          Dunning is the process of sending a reminder to a customer to pay for a product or service.
        url: "N/A"
      - term: Grace Period
        description: |
          Grace period is a period of time after a customer has missed a payment.
        url: "N/A"
      - term: Payment Gateway
        description: |
          A technology service that processes credit card payments for online and in-person transactions.
        url: "N/A"
      - term: Payment Processing Fee
        description: |
          Charges imposed by payment processors and financial institutions for handling payment transactions.
        url: "N/A"
      - term: Payment Schedule
        description: |
          A predetermined timeline specifying when payments are due for products or services.
        url: "N/A"
      - term: Revenue Leakage
        description: |
          Revenue leakage occurs when a business fails to collect all potential revenue due to billing errors or inefficient operations.
        url: "N/A"
      - term: Revenue Recognition
        description: |
          Revenue recognition is the process of recognizing revenue when it is earned.
        url: "N/A"
      - term: Invoice Aging
        description: |
          A report that categorizes unpaid customer invoices based on the length of time they have been outstanding.
        url: "N/A"
      - term: Invoice Due Date
        description: |
          The date on which a customer is expected to pay an invoice.
        url: "N/A"
      - term: Invoice Reconciliation
        description: |
          The process of matching invoices with payments received and ensuring billing records are accurate and consistent.
        url: "N/A"
  - category: SaaS
    definitions:
      - term: Churn
        description: |
          Churn is the rate at which customers cancel their subscriptions.
        url: "N/A"
      - term: Customer Acquisition Cost
        description: |
          The total cost of acquiring a new customer, including marketing and sales expenses.
        url: "N/A"
      - term: Net Revenue Retention
        description: |
          Net Revenue Retention is a metric that measures the percentage of revenue that a company retains from its existing customers.
        url: "N/A"
      - term: Expansion
        description: |
          Expansion is the process of upselling or cross-selling additional products or services to existing customers.
        url: "N/A"
      - term: ARR
        description: |
          Annual Recurring Revenue is the amount of money a company expects to generate from recurring customers.
        url: "N/A"
      - term: MRR
        description: |
          Monthly Recurring Revenue is the amount of money a company expects to generate from recurring customers.
        url: "N/A"
