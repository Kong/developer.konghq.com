providers:
  - name: Amazon Bedrock
    url_patterns:
      - 'https://bedrock-runtime.{region}.amazonaws.com'
    min_version: '2.0'
    capabilities:
      generate:
        supported: true
        streaming: true
        upstream_path: 'Uses the `Converse` and `ConverseStream` API'
        model_example: '[Use the model name for the specific LLM provider](https://docs.aws.amazon.com/bedrock/latest/userguide/model-ids.html)'
        min_version: '2.0'
      completions:
        supported: true
        streaming: true
        model_example: '[Use the model name for the specific LLM provider](https://docs.aws.amazon.com/bedrock/latest/userguide/model-ids.html)'
        min_version: '2.0'
      embeddings:
        supported: true
        streaming: false
        upstream_path: 'Uses the `InvokeModel` and `InvokeWithResponseStream` API'
        model_example: '[Use the model name for the specific LLM provider](https://docs.aws.amazon.com/bedrock/latest/userguide/model-ids.html)'
        min_version: '2.0'
      batches:
        supported: true
        streaming: false
        upstream_path: 'Uses the `ModelInvocationJob` API'
        model_example: 'n/a'
        min_version: '2.0'
        note:
          content: 'Batches processing for Bedrock is supported in the native format from SDK only'
      files:
        supported: true
        streaming: false
        upstream_path: '`/openai/files`'
        model_example: 'n/a'
        min_version: '2.0'
        note:
          content: 'Amazon Bedrock does not have a dedicated files API. File storage uses Google Cloud Storage, similar to AWS S3.'
      image:
        supported: true
        streaming: false
        upstream_path: 'Uses the `InvokeModel` API'
        model_example: '[Use the model name for the specific LLM provider](https://docs.aws.amazon.com/bedrock/latest/userguide/model-ids.html)'
        min_version: '2.0'
      video:
        supported: true
        streaming: false
        upstream_path: 'Uses the `StartAsyncInvoke` API'
        model_example: '[Use the model name for the specific LLM provider](https://docs.aws.amazon.com/bedrock/latest/userguide/model-ids.html)'
        min_version: '2.0'
      agentic:
        supported: false
        streaming: false
        model_example: ''
        min_version: ''
      audio_speech:
        supported: false
        streaming: false
        model_example: ''
        min_version: ''
      audio_transcription:
        supported: false
        streaming: false
        model_example: ''
        min_version: ''
      audio_translation:
        supported: false
        streaming: false
        model_example: ''
        min_version: ''
      realtime:
        supported: false
        streaming: false
        model_example: ''
        min_version: ''
      rerank:
        supported: false
        streaming: false
        model_example: ''
        min_version: ''
    native_formats:
      - llm_format: 'bedrock'
        supported_apis:
          - '/model/{model_name}/converse'
          - '/model/{model_name}/converse-stream'
          - '/model/{model_name}/invoke'
          - '/model/{model_name}/invoke-with-response-stream'
          - '/model/{model_name}/retrieveAndGenerate'
          - '/model/{model_name}/retrieveAndGenerateStream'
          - '/model/{model_name}/rerank'
          - '/model/{model_name}/async-invoke'
          - '/model-invocations'
    limitations:
      provider_specific: []
      statistics_logging:
        - 'Statistics logging is not available for image generation or editing APIs for Amazon Bedrock'

  - name: Anthropic
    url_patterns:
      - 'https://api.anthropic.com:443/{capability_path}'
    min_version: '2.0'
    capabilities:
      generate:
        supported: true
        streaming: true
        upstream_path: '`/v1/messages`'
        model_example: 'claude-sonnet-4-20250514'
        min_version: '2.0'
      completions:
        supported: true
        streaming: false
        upstream_path: '`/v1/complete`'
        model_example: 'claude-sonnet-4-20250514'
        min_version: '2.0'
      batches:
        supported: true
        streaming: true
        upstream_path: '`/v1/messages/batches`'
        model_example: 'n/a'
        min_version: '2.0'
        note:
          content: 'Batches processing for Anthropic is supported in the native format from SDK only'
      embeddings:
        supported: false
        streaming: false
        model_example: ''
        min_version: ''
      files:
        supported: false
        streaming: false
        model_example: ''
        min_version: ''
      agentic:
        supported: false
        streaming: false
        model_example: ''
        min_version: ''
      audio_speech:
        supported: false
        streaming: false
        model_example: ''
        min_version: ''
      audio_transcription:
        supported: false
        streaming: false
        model_example: ''
        min_version: ''
      audio_translation:
        supported: false
        streaming: false
        model_example: ''
        min_version: ''
      image:
        supported: false
        streaming: false
        model_example: ''
        min_version: ''
      video:
        supported: false
        streaming: false
        model_example: ''
        min_version: ''
      realtime:
        supported: false
        streaming: false
        model_example: ''
        min_version: ''
      rerank:
        supported: false
        streaming: false
        model_example: ''
        min_version: ''
    native_formats:
      - llm_format: 'anthropic'
        supported_apis:
          - '/v1/messages'
          - '/v1/messages/batches'
    limitations:
      provider_specific:
        - 'Does not support embeddings'
      statistics_logging:
        - 'No statistics logging for completions'

  - name: Azure OpenAI
    url_patterns:
      - 'https://{azure_instance}.openai.azure.com:443/openai/deployments/{deployment_name}/{capability_path}'
    min_version: '2.0'
    capabilities:
      generate:
        supported: true
        streaming: true
        upstream_path: '`/openai/deployments/{deployment_name}/chat/completions`'
        model_example: 'gpt-4o'
        min_version: '2.0'
      completions:
        supported: true
        streaming: true
        upstream_path: '`/openai/deployments/{deployment_name}/completions`'
        model_example: 'gpt-4o-mini'
        min_version: '2.0'
      embeddings:
        supported: true
        streaming: false
        upstream_path: '`/openai/deployments/{deployment_name}/embeddings`'
        model_example: 'text-embedding-3-small'
        min_version: '2.0'
        note:
          content: 'Use `text-embedding-3-small` or `text-embedding-3-large` for dynamic dimensions.'
      files:
        supported: true
        streaming: false
        upstream_path: '`/openai/files`'
        model_example: 'n/a'
        min_version: '2.0'
      batches:
        supported: true
        streaming: false
        upstream_path: '`/openai/batches`'
        model_example: 'n/a'
        min_version: '2.0'
      agentic:
        supported: true
        streaming: false
        upstream_path: '`/openai/assistants` and `/openai/v1/responses`'
        model_example: 'n/a'
        min_version: '2.0'
        note:
          content: 'Assistants API requires header `OpenAI-Beta: assistants=v2`. Responses API requires `config.azure_api_version` set to `"preview"`'
      audio_speech:
        supported: true
        streaming: false
        upstream_path: '`/openai/audio/speech`'
        model_example: 'n/a'
        min_version: '2.0'
      audio_transcription:
        supported: true
        streaming: false
        upstream_path: '`/openai/audio/transcriptions`'
        model_example: 'n/a'
        min_version: '2.0'
      audio_translation:
        supported: true
        streaming: false
        upstream_path: '`/openai/audio/translations`'
        model_example: 'n/a'
        min_version: '2.0'
      image:
        supported: true
        streaming: false
        upstream_path: '`/openai/images/generations` and `/openai/images/edits`'
        model_example: 'n/a'
        min_version: '2.0'
      video:
        supported: true
        streaming: false
        upstream_path: '`/openai/v1/video/generations/jobs`'
        model_example: 'sora-2'
        min_version: '2.0'
      realtime:
        supported: true
        streaming: true
        upstream_path: '`/openai/realtime`'
        model_example: 'n/a'
        min_version: '2.0'
        note:
          content: 'For requests to Azure OpenAI realtime API, include the header `OpenAI-Beta: realtime=v1`.'
      rerank:
        supported: false
        streaming: false
        model_example: ''
        min_version: ''
    limitations:
      provider_specific: []
      statistics_logging:
        - 'No statistics logging for assistants, batch, or audio APIs'

