resource_attributes:
  service.name: Name of the service exposing the signal. This is optional, the default value is `kong`.
  service.version: Gateway version of the node exposing the signal.
  service.instance.id: ID of the node exposing the signal.

attributes:
  kong.service.name: Name of the Gateway Service.
  kong.route.name: Name of the Route.
  kong.auth.consumer.name: Name of the authenticated Consumer.
  kong.response.source: |
    Origin of the current response. Possible values:
      - `upstream` if the response originated by successfully contacting the upstream service
      - `kong` otherwise
  kong.workspace.name: Name of the Workspace.
  http.request.method: Method used in the HTTP request.
  kong.shared_dict.name: Name of the shared dict.
  kong.subsystem: |
    Nginx subsystem that produced the metric. Possible values:
      - `http`
      - `stream`
  kong.connection.state: |
    State of the client connection. Possible values:
      - `accepted`
      - `handled`
      - `total`
      - `active`
      - `reading`
      - `writing`
      - `waiting`
  kong.pid: Worker process ID.
  kong.timer.state: |
    State of the timer. Possible values:
      - `pending`
      - `running`
  kong.upstream.name: Name of the Upstream.
  kong.target.address: Address of the Target.
  server.address: Address of the server.
  kong.upstream.state: |
    Health of the Upstream Target. Possible values:
      - `healthy`
      - `unhealthy`
      - `dns_error`
  kong.dp.host.name: Host name fo the data plane.
  kong.dp.node.id: ID of the data plane node.
  kong.dp.host.ip: IP address of the data plane host.
  kong.dp.node.version: Version of the data plane node.
  kong.ee.license.feature: |
    Enterprise feature. Possible values:
      - `ee_entity_read`
      - `ee_entity_write`
  client.address: IP address of the client.
  url.query: Query in the request URL.
  url.full: Full URL ued in the request.
  url.path: Path in the request URL.
  user_agent.original: Original user agent.
  http.request.size: Size of the request.
  http.request.header.*: Value of the request header.
  http.response.header.*: Value of the response header.
  http.response.size: Size of the response.
  http.response.status_code: Status code of the response.
  kong.request.id: ID of the request.
  kong.request.started_at: Timestamp of the request start time.
  kong.workspace.id: ID of the Workspace.
  kong.latency.client: 
  kong.latency.third_party.total:
  kong.latency.third_party.dns:
  kong.latency.third_party.http_client:
  kong.latency.third_party.redis:
  kong.latency.internal: *latency_internal
  kong.latency.upstream: *latency_upstream
  kong.latency.receive:
  kong.latency.total: *latency_total
  kong.latency.socket:
  kong.route.created_at: "Value of the Route's [`created_at`](/gateway/entities/route/#schema-route-created-at) parameter."
  kong.route.http_redirect_status_code: "Value of the Route's [`http_redirect_status_code`](/gateway/entities/route/#schema-route-http-redirect-status-code) parameter."
  kong.route.id: "Value of the Route's [`id`](/gateway/entities/route/#schema-route-id) parameter."
  kong.route.tags: "Value of the Route's [`tags`](/gateway/entities/route/#schema-route-tags) parameter."
  kong.route.path_handling: "Value of the Route's [`path_handling`](/gateway/entities/route/#schema-route-path-handling) parameter."
  kong.route.paths: "Value of the Route's [`paths`](/gateway/entities/route/#schema-route-paths) parameter."
  kong.route.preserve_host: "Value of the Route's [`preserve_host`](/gateway/entities/route/#schema-route-preserve-host) parameter."
  kong.route.protocols: "Value of the Route's [`protocols`](/gateway/entities/route/#schema-route-protocols) parameter."
  kong.route.regex_priority: "Value of the Route's [`regex_priority`](/gateway/entities/route/#schema-route-regex-priority) parameter."
  kong.route.request_buffering: "Value of the Route's [`request_buffering`](/gateway/entities/route/#schema-route-request-buffering) parameter."
  kong.route.response_buffering: "Value of the Route's [`response_buffering`](/gateway/entities/route/#schema-route-response-buffering) parameter."
  kong.route.service.id: "Value of the Route's [`service.id`](/gateway/entities/route/#schema-route-service-id) parameter."
  kong.route.strip_path: "Value of the Route's [`strip_path`](/gateway/entities/route/#schema-route-strip-path) parameter."
  kong.route.updated_at: "Value of the Route's [`updated_at`](/gateway/entities/route/#schema-route-updated-at) parameter."
  kong.route.ws_id: Workspace ID of the Route.
  kong.service.connect_timeout: "Value of the Gateway Service's [`connect_timeout`](/gateway/entities/service/#schema-service-connect-timeout) parameter."
  kong.service.created_at: "Value of the Gateway Service's [`created_at`](/gateway/entities/service/#schema-service-created-at) parameter."
