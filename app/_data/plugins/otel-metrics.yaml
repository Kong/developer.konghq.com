metrics:
  - name: http.server.request.count
    description: Total number of incoming HTTP requests.
    unit: "{request}"
    type: Sum
    attributes:
      - kong.service.name
      - kong.route.name
      - kong.auth.consumer.name
      - kong.response.source
      - kong.workspace.name
      - http.request.method
      - kong.response.status_code
  - name: kong.latency.total
    description: &latency_total Complete end-to-end duration of a request in seconds.
    unit: "s"
    type: Histogram
    attributes:
      - kong.service.name
      - kong.route.name
      - kong.workspace.name
  - name: kong.latency.internal
    description: &latency_internal "Kong’s internal processing time in seconds, from when the Gateway receives the request from the client to when it sends the request to the upstream service."
    unit: "s"
    type: Histogram
    attributes:
      - kong.service.name
      - kong.route.name
      - kong.workspace.name
  - name: kong.latency.upstream
    description: &latency_upstream Upstream processing time in seconds, from when the Gateway sends the request to the upstream, to when the data is returned to Kong.
    unit: "s"
    type: Histogram
    attributes:
      - kong.service.name
      - kong.route.name
      - kong.workspace.name
  - name: http.server.request.size
    description: Size of each incoming HTTP request in bytes.
    unit: "By"
    type: Histogram
    attributes:
      - kong.service.name
      - kong.route.name
      - kong.auth.consumer.name
      - kong.workspace.name
  - name: http.server.response.size
    description: Total size of the HTTP response sent back to the client in bytes.
    unit: "By"
    type: Histogram
    attributes:
      - kong.service.name
      - kong.route.name
      - kong.auth.consumer.name
      - kong.workspace.name
  - name: kong.shared_dict.usage
    description: Current memory usage of a shared dict in bytes.
    unit: "By"
    type: Gauge
    attributes:
      - kong.shared_dict.name
      - kong.subsystem
  - name: kong.shared_dict.size
    description: Total memory size of a shared dict in bytes.
    unit: "By"
    type: Gauge
    attributes:
      - kong.shared_dict.name
      - kong.subsystem
  - name: kong.memory.workers.lua_vm
    description: "Memory used by the worker’s Lua VM in bytes."
    unit: "By"
    type: Gauge
    attributes:
      - kong.pid
      - kong.subsystem
  - name: kong.nginx.connection.count
    description: Number of client connections in Nginx.
    unit: "{connection}"
    type: Gauge
    attributes:
      - kong.subsystem
      - kong.connection.state
  - name: kong.nginx.timer.count
    description: Number of internal scheduled timers Nginx is running in the background.
    unit: "{timer}"
    type: Gauge
    attributes:
      - kong.timer.state
  - name: kong.db.connection.status
    description: Shows whether Kong has an active database connection. A value of 1 means connected. A value of 0 means not connected.
    unit: "1"
    type: Gauge
  - name: kong.cp.connection.status
    description: Shows whether the data plane has an active connection to the control plane. A value of 1 means connected. A value of 0 means not connected.
    unit: "1"
    type: Gauge
  - name: kong.upstream.target.status
    description: "Upstream target’s health. The actual status is in the state attribute, with the metric value set to 1 when a state is populated."
    unit: "1"
    type: Gauge
    attributes:
      - kong.upstream.name
      - kong.target.address
      - server.address
      - kong.upstream.state
      - kong.subsystem
  - name: kong.dp.cluster_cert.expiry
    description: "Timestamp when the data plane’s cluster certificate will expire."
    unit: "s"
    type: Gauge
  - name: kong.db.entity.count
    description: "Number of entities stored in Kong’s database."
    unit: "{entity}"
    type: Gauge
  - name: kong.db.entity.error.count
    description: Number of errors seen during database entity count collection.
    unit: "{error}"
    type: Sum
  - name: kong.ee.license.signature
    description: Last 8 bytes of the Enterprise license signature as a number.
    type: Gauge
  - name: kong.ee.license.expiration
    description: Unix epoch time when the license expires, shifted by 24 hours to avoid timezone differences.
    unit: "s"
    type: Gauge
  - name: kong.ee.license.features
    description: |
      Indicates whether the data plane can read or write entities under the current license. 
      Each capability (`ee_entity_read` and `ee_entity_write`) is reported as its own metric, where 1 means allowed and 0 means not allowed.
    unit: "1"
    type: Gauge
    attributes:
      - kong.ee.license.feature
  - name: kong.ee.license.error.count
    description: Number of errors that occurred while collecting license information.
    unit: "{error}"
    type: Sum
  - name: kong.websocket.server.total_connections
    min_version: "3.14"
    description: Total number of incoming WebSocket connections, including active and previously closed connections.
    unit: "{request}"
    type: Sum
    attributes:
      - kong.service.name
      - kong.route.name
      - kong.workspace.name
      - kong.auth.consumer.name
  - name: kong.websocket.server.active_connections
    min_version: "3.14"
    description: Number of currently active WebSocket connections.
    unit: "{request}"
    type: Gauge
    attributes:
      - kong.service.name
      - kong.route.name
      - kong.workspace.name
      - kong.auth.consumer.name
  - name: kong.websocket.server.received.message.size
    min_version: "3.14"
    description: Size of incoming WebSocket message bodies in bytes, from the client.
    unit: "By"
    type: Histogram
    attributes:
      - kong.service.name
      - kong.route.name
      - kong.workspace.name
      - kong.auth.consumer.name
  - name: kong.websocket.server.sent.message.size
    min_version: "3.14"
    description: Size of WebSocket messages sent back to the client in bytes.
    unit: "By"
    type: Histogram
    attributes:
      - kong.service.name
      - kong.route.name
      - kong.workspace.name
      - kong.auth.consumer.name
  - name: kong.websocket.handshake.error.count
    min_version: "3.14"
    description: Number of errors seen during the WebSocket handshake.
    unit: "{error}"
    type: Sum
    attributes:
      - error.type
  - name: kong.websocket.connection.duration
    min_version: "3.14"
    description: Duration of successfully established WebSocket connections in seconds.
    unit: "s"
    type: Histogram
    attributes:
      - kong.service.name
      - kong.route.name
      - kong.workspace.name
      - kong.auth.consumer.name
  - name: gen_ai.client.operation.duration
    min_version: "3.14"
    description: Total time Kong spends processing a Gen AI operation, such as an LLM request. Requires `enable_request_metrics` to populate the `error.type` attribute.
    unit: "s"
    type: Histogram
    attributes:
      - gen_ai.provider.name
      - gen_ai.request.model
      - gen_ai.response.model
      - gen_ai.operation.name
      - kong.workspace.name
      - kong.auth.consumer.name
      - kong.gen_ai.request.mode
      - error.type
  - name: gen_ai.server.request.duration
    min_version: "3.14"
    description: Time the LLM provider spends processing the request. Requires `enable_latency_metrics` set to `true`. Requires `enable_request_metrics` to populate the `error.type` attribute.
    unit: "s"
    type: Histogram
    attributes:
      - gen_ai.provider.name
      - gen_ai.request.model
      - gen_ai.response.model
      - gen_ai.operation.name
      - kong.workspace.name
      - kong.auth.consumer.name
      - kong.gen_ai.request.mode
      - error.type
  - name: gen_ai.client.token.usage
    min_version: "3.14"
    description: Number of tokens consumed by the Gen AI operation.
    unit: "{token}"
    type: Sum
    attributes:
      - gen_ai.provider.name
      - gen_ai.request.model
      - gen_ai.response.model
      - gen_ai.token.type
      - gen_ai.operation.name
      - kong.workspace.name
      - kong.auth.consumer.name
      - kong.gen_ai.request.mode
  - name: gen_ai.server.time_to_first_token
    min_version: "3.14"
    description: Time from when the model server receives the request until the first output token is generated.
    unit: "s"
    type: Histogram
    attributes:
      - gen_ai.provider.name
      - gen_ai.request.model
      - gen_ai.response.model
      - gen_ai.operation.name
      - kong.workspace.name
      - kong.auth.consumer.name
      - kong.gen_ai.request.mode
  - name: gen_ai.server.time_per_output_token
    min_version: "3.14"
    description: Time between successive output tokens generated by the model server after the first token.
    unit: "s"
    type: Histogram
    attributes:
      - gen_ai.provider.name
      - gen_ai.request.model
      - gen_ai.response.model
      - gen_ai.operation.name
      - kong.workspace.name
      - kong.auth.consumer.name
      - kong.gen_ai.request.mode
  - name: kong.gen_ai.llm.cost
    min_version: "3.14"
    description: Cost of AI requests.
    unit: "{cost}"
    type: Sum
    attributes:
      - gen_ai.provider.name
      - gen_ai.request.model
      - gen_ai.response.model
      - gen_ai.operation.name
      - kong.gen_ai.cache.status
      - kong.gen_ai.vector_db
      - kong.gen_ai.embeddings.provider
      - kong.gen_ai.embeddings.model
      - kong.workspace.name
      - kong.auth.consumer.name
      - kong.gen_ai.request.mode
  - name: kong.gen_ai.cache.fetch.latency
    min_version: "3.14"
    description: Time to fetch a response from the semantic cache.
    unit: "s"
    type: Histogram
    attributes:
      - gen_ai.provider.name
      - gen_ai.request.model
      - gen_ai.response.model
      - gen_ai.operation.name
      - kong.gen_ai.cache.status
      - kong.gen_ai.vector_db
      - kong.gen_ai.embeddings.provider
      - kong.gen_ai.embeddings.model
      - kong.workspace.name
      - kong.auth.consumer.name
      - kong.gen_ai.request.mode
  - name: kong.gen_ai.cache.embeddings.latency
    min_version: "3.14"
    description: Time to generate embeddings during cache operations.
    unit: "s"
    type: Histogram
    attributes:
      - gen_ai.provider.name
      - gen_ai.request.model
      - gen_ai.response.model
      - gen_ai.operation.name
      - kong.gen_ai.cache.status
      - kong.gen_ai.vector_db
      - kong.gen_ai.embeddings.provider
      - kong.gen_ai.embeddings.model
      - kong.workspace.name
      - kong.auth.consumer.name
      - kong.gen_ai.request.mode
  - name: kong.gen_ai.rag.fetch.latency
    min_version: "3.14"
    description: Time to fetch data from a RAG source.
    unit: "s"
    type: Histogram
    attributes:
      - gen_ai.provider.name
      - gen_ai.request.model
      - gen_ai.response.model
      - gen_ai.operation.name
      - kong.gen_ai.cache.status
      - kong.gen_ai.vector_db
      - kong.gen_ai.embeddings.provider
      - kong.gen_ai.embeddings.model
      - kong.workspace.name
      - kong.auth.consumer.name
      - kong.gen_ai.request.mode
  - name: kong.gen_ai.rag.embeddings.latency
    min_version: "3.14"
    description: Time to generate embeddings for RAG operations.
    unit: "s"
    type: Histogram
    attributes:
      - gen_ai.provider.name
      - gen_ai.request.model
      - gen_ai.response.model
      - gen_ai.operation.name
      - kong.gen_ai.cache.status
      - kong.gen_ai.vector_db
      - kong.gen_ai.embeddings.provider
      - kong.gen_ai.embeddings.model
      - kong.workspace.name
      - kong.auth.consumer.name
      - kong.gen_ai.request.mode
  - name: kong.gen_ai.aws.guardrails.latency
    min_version: "3.14"
    description: Time for AWS Guardrails to process a request.
    unit: "s"
    type: Histogram
    attributes:
      - kong.gen_ai.aws.guardrails.id
      - kong.gen_ai.aws.guardrails.version
      - kong.gen_ai.aws.guardrails.mode
      - kong.gen_ai.aws.guardrails.region
      - kong.workspace.name
      - kong.auth.consumer.name
  - name: kong.gen_ai.mcp.response.size
    min_version: "3.14"
    description: Size of the MCP response body in bytes.
    unit: "By"
    type: Histogram
    attributes:
      - kong.service.name
      - kong.route.name
      - kong.workspace.name
      - mcp.method.name
      - gen_ai.tool.name
  - name: kong.gen_ai.mcp.request.error.count
    min_version: "3.14"
    description: Number of MCP request errors.
    unit: "{error}"
    type: Sum
    attributes:
      - kong.service.name
      - kong.route.name
      - kong.workspace.name
      - mcp.method.name
      - gen_ai.tool.name
      - error.type
  - name: mcp.client.operation.duration
    min_version: "3.14"
    description: Duration of the MCP request as observed by the sender. Only available when the AI MCP Proxy plugin is in passthrough-listener mode. Requires `enable_latency_metrics` set to `true`.
    unit: "s"
    type: Histogram
    attributes:
      - kong.service.name
      - kong.route.name
      - kong.workspace.name
      - mcp.method.name
      - gen_ai.tool.name
      - error.type
      - gen_ai.operation.name
  - name: mcp.server.operation.duration
    min_version: "3.14"
    description: Duration of the MCP request as observed by the receiver.
    unit: "s"
    type: Histogram
    attributes:
      - kong.service.name
      - kong.route.name
      - kong.workspace.name
      - mcp.method.name
      - gen_ai.tool.name
      - error.type
      - gen_ai.operation.name
  - name: kong.gen_ai.mcp.acl.allowed
    min_version: "3.14"
    description: Number of MCP requests allowed by ACL rules.
    unit: "{request}"
    type: Sum
    attributes:
      - kong.service.name
      - kong.route.name
      - kong.workspace.name
      - kong.gen_ai.mcp.primitive
      - kong.gen_ai.mcp.primitive_name
  - name: kong.gen_ai.mcp.acl.denied
    min_version: "3.14"
    description: Number of MCP requests denied by ACL rules.
    unit: "{request}"
    type: Sum
    attributes:
      - kong.service.name
      - kong.route.name
      - kong.workspace.name
      - kong.gen_ai.mcp.primitive
      - kong.gen_ai.mcp.primitive_name
  - name: kong.gen_ai.a2a.request.count
    min_version: "3.14"
    description: Total number of A2A requests.
    unit: "{request}"
    type: Sum
    attributes:
      - kong.service.name
      - kong.route.name
      - kong.workspace.name
      - kong.gen_ai.a2a.method
      - kong.gen_ai.a2a.binding
  - name: kong.gen_ai.a2a.request.duration
    min_version: "3.14"
    description: Duration of an A2A request in seconds.
    unit: "s"
    type: Histogram
    attributes:
      - kong.service.name
      - kong.route.name
      - kong.workspace.name
      - kong.gen_ai.a2a.method
      - kong.gen_ai.a2a.binding
  - name: kong.gen_ai.a2a.response.size
    min_version: "3.14"
    description: Size of the A2A response body in bytes.
    unit: "By"
    type: Histogram
    attributes:
      - kong.service.name
      - kong.route.name
      - kong.workspace.name
      - kong.gen_ai.a2a.method
      - kong.gen_ai.a2a.binding
  - name: kong.gen_ai.a2a.ttfb
    min_version: "3.14"
    description: Time to first byte for A2A streaming responses in seconds.
    unit: "s"
    type: Histogram
    attributes:
      - kong.service.name
      - kong.route.name
      - kong.workspace.name
      - kong.gen_ai.a2a.method
      - kong.gen_ai.a2a.binding
  - name: kong.gen_ai.a2a.request.error.count
    min_version: "3.14"
    description: Number of A2A request errors.
    unit: "{error}"
    type: Sum
    attributes:
      - kong.service.name
      - kong.route.name
      - kong.workspace.name
      - kong.gen_ai.a2a.method
      - kong.gen_ai.a2a.binding
      - kong.gen_ai.a2a.error.type
  - name: kong.gen_ai.a2a.task.state.count
    min_version: "3.14"
    description: Number of A2A task state transitions.
    unit: "{state}"
    type: Sum
    attributes:
      - kong.service.name
      - kong.route.name
      - kong.workspace.name
      - kong.gen_ai.a2a.task.state

