  - header:
    columns:
      - header:
          type: h2
          text: "How does kongctl work?"
        blocks:
        - type: text
          config: |
            kongctl provides multiple interfaces for managing {{site.konnect_short_name}}:

            **Declarative Configuration**: Define your infrastructure in YAML files and use _plan-based_ workflows
            to preview and apply changes. The declarative engine is stateless and calculates differences by querying
            live {{site.konnect_short_name}} resources.

            **Imperative Commands**: Execute ad-hoc operations to get or list resources directly
            from the command line with human-friendly or machine-readable output formats.

            **Interactive TUI**: Explore your {{site.konnect_short_name}} resources using a terminal-based user interface
            with keyboard navigation and helpful features.
        - type: text
          config: |
            kongctl communicates with {{site.konnect_short_name}} via its APIs and supports authentication
            through browser-based device flow or personal access tokens.

      - header:
          type: h2
          text: Other tools
        blocks:
          - type: structured_text
            config:
              blocks:
              - type: unordered_list
                items:
                    - "**[decK](/deck/)**: Manage {{site.base_gateway}} configuration with declarative, file-based automation"
                    - "**[Terraform](/terraform/)**: Manage infrastructure as code and automated deployments"
                    - "**[KIC](/kubernetes-ingress-controller/)**: Manage ingress traffic and routing rules for Kubernetes services"
                    - "**[{{site.base_gateway}} Admin API](/api/gateway/admin-ee/)**: Manage on-prem {{site.base_gateway}} entities via an API"
                    - "**[Control Plane Config API](/api/konnect/control-planes-config/)**: Manage {{site.base_gateway}} entities within {{site.konnect_short_name}} Control Planes via an API"

