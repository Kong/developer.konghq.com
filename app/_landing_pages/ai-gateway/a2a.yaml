metadata:
  title: "A2A Traffic Gateway"
  content_type: landing_page
  description: Observe Agent-to-Agent (A2A) protocol traffic through {{site.ai_gateway}}.
  products:
    - ai-gateway
    - gateway
  works_on:
    - on-prem
    - konnect
  tags:
    - ai
    - a2a

rows:
  - header:
      type: h1
      text: "Observability and control layer for Agent-to-Agent protocol traffic"
      sub_text: Route A2A traffic through {{site.ai_gateway}} with protocol-aware metrics, tracing, and agent card rewriting

  - header:
      type: h2
      text: Route A2A traffic through {{site.ai_gateway}}
    columns:
      - blocks:
          - type: text
            config: |
              The [Agent-to-Agent (A2A)](https://a2aproject.github.io/A2A/) protocol defines how AI agents communicate with each other over HTTP using JSON-RPC and REST bindings. As agent-to-agent communication moves into production, teams need visibility into A2A traffic and control over how it flows.

              {{site.ai_gateway}} acts as a control and observability layer for A2A traffic, enabling you to route agent-to-agent requests, extract task metadata, rewrite agent card URLs, and feed structured metrics into the Konnect analytics pipeline.

      - blocks:
          - type: image
            config:
              url: /assets/images/ai-gateway/a2a.svg
              alt_text: Overview of A2A traffic flowing through AI Gateway

  - columns:
      - blocks:
          - type: structured_text
            config:
              header:
                type: h2
                text: "Configure A2A Agents with Entities and Policies {% new_in 2.0.0 %}"
              blocks:
                - type: text
                  text: |
                    Create an [Agent Entity](/ai-gateway/entities/agent/) to route your A2A endpoints through {{site.ai_gateway}} to your backend agents to unlock observability into agent communication.
          - type: card
            config:
              icon: /assets/icons/linked-services.svg
              title: Agent Entity
              description: Configure A2A traffic and expose agents using the Entity model in {{site.ai_gateway}} {% new_in 2.0 %}.
              ctas:
                - text: Agent entity reference
                  url: "/ai-gateway/entities/agent/"
                - text: Policy entity reference
                  url: "/ai-gateway/entities/policy/"
      - blocks:
          - type: structured_text
            config:
              header:
                type: h2
                text: "Secure A2A Agents with Policies"
              blocks:
                - type: text
                  text: |
                    Attach Policies to your Agent entities to secure access, control traffic, and monitor usage. You can also add {{site.base_gateway}} plugins for rate limiting and additional traffic controls.
          - type: card
            config:
              icon: /assets/icons/lock.svg
              title: Secure and govern A2A traffic
              description: Secure A2A agents and control access with Policies and {{site.base_gateway}} plugins.
              ctas:
                - text: OpenID Connect
                  url: "/plugins/openid-connect/"
                - text: Rate Limiting
                  url: "/plugins/rate-limiting/"
                - text: A2A audit logs
                  url: "/ai-gateway/ai-audit-log-reference/#ai-a2a-proxy-logs"

  - header:
      type: h2
      text: "A2A traffic observability"
      description: |
        {{site.ai_gateway}} records A2A protocol traffic data so you can analyze how agent-to-agent requests are processed and resolved.
        - Audit logs capture task IDs, JSON-RPC method calls, payloads, latencies, and errors.
        - OpenTelemetry spans record task state, context IDs, TTFB, SSE event counts, and response sizes.
        - Metrics track A2A-specific signals and performance indicators over time.
    column_count: 3
    columns:
      - blocks:
        - type: card
          config:
            title: A2A audit logs
            icon: /assets/icons/monitor.svg
            description: Review AI A2A Proxy log output fields, task states, and payload capture.
            cta:
              url: /ai-gateway/ai-audit-log-reference/#ai-a2a-proxy-logs
              align: end
      - blocks:
        - type: card
          config:
            title: Logging plugins
            description: Send A2A traffic data to File Log, HTTP Log, TCP Log, and other destinations.
            icon: /assets/icons/audit.svg
            cta:
              url: /plugins/?category=logging
              align: end
      - blocks:
        - type: card
          config:
            title: A2A OpenTelemetry spans
            description: Inspect A2A-specific span attributes in distributed traces.
            icon: /assets/icons/opentelemetry.svg
            cta:
              url: /ai-gateway/llm-open-telemetry/#a2a-agent-traffic
              align: end
      - blocks:
        - type: card
          config:
            title: A2A OpenTelemetry metrics
            description: Monitor A2A-specific OTLP metrics and telemetry signals.
            icon: /assets/icons/opentelemetry.svg
            cta:
              url: /ai-gateway/ai-otel-metrics/#a2a-metrics
              align: end
      - blocks:
        - type: card
          config:
            title: Agentic usage analytics in {{site.konnect_short_name}}
            description: View A2A-specific metrics and analytics in {{site.konnect_short_name}}.
            icon: /assets/icons/KogoBlue.svg
            cta:
              url: /observability/explorer/?tab=agentic-usage#metrics
              align: end

  - header:
      type: h2
      text: "Govern A2A traffic"
      description: |
        Manage how A2A traffic flows through {{site.ai_gateway}} using Policies and plugins.
        Apply rate limiting, traffic control, and request transformation to A2A routes.
    column_count: 2
    columns:
      - blocks:
        - type: card
          config:
            title: Rate Limiting
            description: Control A2A traffic rate with standard gateway plugins.
            icon: /assets/icons/ai.svg
            ctas:
              - text: Rate Limiting plugin
                url: /plugins/rate-limiting/
      - blocks:
        - type: card
          config:
            title: Authentication and Authorization
            description: Secure A2A routes with authentication plugins.
            icon: /assets/icons/lock.svg
            ctas:
              - text: Authentication plugins
                url: /plugins/?category=authentication
