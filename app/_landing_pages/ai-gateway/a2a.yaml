metadata:
  title: "A2A Traffic Gateway"
  content_type: landing_page
  description: Observe Agent-to-Agent (A2A) protocol traffic through {{site.ai_gateway}}.
  products:
    - ai-gateway
    - gateway
  works_on:
    - on-prem
    - konnect
  tags:
    - ai
    - a2a

rows:
  - header:
      type: h1
      text: "Observability and control layer for Agent-to-Agent protocol traffic"
      sub_text: Route A2A traffic through {{site.ai_gateway}} with protocol-aware metrics, tracing, and agent card rewriting

  - header:
      type: h2
      text: Route A2A traffic through {{site.ai_gateway}}
    columns:
      - blocks:
          - type: text
            config: |
              The [Agent-to-Agent (A2A)](https://a2aproject.github.io/A2A/) protocol defines how AI agents communicate with each other over HTTP using JSON-RPC and REST bindings. As agent-to-agent communication moves into production, teams need visibility into A2A traffic and control over how it flows.

              {{site.ai_gateway}} acts as a control and observability layer for A2A traffic, enabling you to route agent-to-agent requests, extract task metadata, rewrite agent card URLs, and feed structured metrics into the Konnect analytics pipeline. In {{site.ai_gateway}} {% new_in 2.0 %}, you configure A2A traffic using [AI Agents](/ai-gateway/entities/ai-agent/) and attach [AI Policies](/ai-gateway/entities/ai-policy/) for authentication, access control, and observability.

              Learn how to:
              - [Proxy A2A traffic via {{site.ai_gateway}}](#proxy-a2a-traffic-via-ai-gateway-new-in-2-0)
              - [Secure and govern A2A traffic](#secure-and-govern-a2a-traffic)
              - [Observe A2A traffic](#observe-a2a-traffic)

      - blocks:
          - type: image
            config:
              url: /assets/images/ai-gateway/a2a.svg
              alt_text: Overview of A2A traffic flowing through AI Gateway

  - columns:
      - blocks:
          - type: structured_text
            config:
              header:
                type: h2
                text: "Proxy A2A traffic via {{site.ai_gateway}} {% new_in 2.0 %}"
              blocks:
                - type: text
                  text: |
                    Create [AI Agent](/ai-gateway/entities/ai-agent/) entities to proxy your A2A endpoints through {{site.ai_gateway}} to your backend agents. Then attach [AI Policies](/ai-gateway/entities/ai-policy/) for authentication, access control, and observability.
          - type: card
            config:
              icon: /assets/icons/linked-services.svg
              title: AI Agent entity
              description: Create and expose A2A agents using the AI Agent in {{site.ai_gateway}}.
              ctas:
                - text: AI Agent reference
                  url: "/ai-gateway/entities/ai-agent/"
                - text: AI Policy reference
                  url: "/ai-gateway/entities/ai-policy/"
      - blocks:
          - type: structured_text
            config:
              header:
                type: h2
                text: "Secure and govern A2A traffic"
              blocks:
                - type: text
                  text: |
                    Protect your A2A agents using AI Policies and {{site.base_gateway}} plugins. Attach [AI Policies](/ai-gateway/entities/ai-policy/) to your [AI Agent](/ai-gateway/entities/ai-agent/) entities for authentication, then use rate limiting and other security plugins to enforce traffic policies.
          - type: card
            config:
              icon: /assets/icons/lock.svg
              title: Secure and govern with Policies
              description: Secure A2A agents and control access with Policies.
              ctas:
                - text: OpenID Connect
                  url: "/plugins/openid-connect/"
                - text: Rate Limiting
                  url: "/plugins/?category=traffic-control"
                - text: Authentication plugins
                  url: "/plugins/?category=authentication"

  - header:
      type: h2
      text: "Observe A2A traffic"
      description: |
        {{site.ai_gateway}} records A2A protocol traffic data so you can analyze how agent-to-agent requests are processed and resolved.
        - Audit logs capture task IDs, JSON-RPC method calls, payloads, latencies, and errors.
        - OpenTelemetry spans record task state, context IDs, TTFB, SSE event counts, and response sizes.
        - Metrics track A2A-specific signals and performance indicators over time.
    column_count: 3
    columns:
      - blocks:
        - type: card
          config:
            title: A2A audit logs
            icon: /assets/icons/monitor.svg
            description: Review AI A2A Proxy log output fields, task states, and payload capture.
            cta:
              url: /ai-gateway/ai-audit-log-reference/#ai-a2a-proxy-logs
              align: end
      - blocks:
        - type: card
          config:
            title: A2A OpenTelemetry spans
            description: Inspect A2A-specific span attributes in distributed traces.
            icon: /assets/icons/opentelemetry.svg
            cta:
              url: /ai-gateway/llm-open-telemetry/#a2a-agent-traffic
              align: end
      - blocks:
        - type: card
          config:
            title: A2A OpenTelemetry metrics
            description: Monitor A2A-specific OTLP metrics and telemetry signals.
            icon: /assets/icons/opentelemetry.svg
            cta:
              url: /ai-gateway/ai-otel-metrics/#a2a-metrics
              align: end
      - blocks:
        - type: card
          config:
            title: Agentic usage analytics in {{site.konnect_short_name}}
            description: View A2A-specific metrics and analytics in {{site.konnect_short_name}}.
            icon: /assets/icons/KogoBlue.svg
            cta:
              url: /observability/explorer/?tab=agentic-usage#metrics
              align: end
