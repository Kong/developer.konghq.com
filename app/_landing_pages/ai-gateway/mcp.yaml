metadata:
  title: "MCP Traffic Gateway"
  content_type: landing_page
  description: This page is an introduction to MCP Traffic Gateway capabilities in {{site.ai_gateway}}.
  products:
    - ai-gateway
    - gateway
  works_on:
    - on-prem
    - konnect
  breadcrumbs:
    - /ai-gateway/
  tags:
    - ai
