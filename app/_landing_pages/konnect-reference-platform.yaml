metadata:
  title: "The Konnect Reference Platform"
  content_type: landing_page
  products:
    - konnect
  description: Provides a complete guide for platform builders to to integrate Kong Konnect into their engineering organization and API delivery process. 
  tags:
    - konnect
    - automation
    - apiops
  breadcrumb: /konnect-reference-platform/

rows:
  - header:
      type: h1
      text: "Konnect Reference Platform"
    columns:
      - blocks:
          - type: structured_text
            config:
              blocks:
                - type: text
                  text: |
                    The Konnect Reference Platform (RP) is a technical guide designed to help you integrate [Kong Konnect](https://konghq.com/products/kong-konnect)
                    into your engineering organization's technology stack. The RP provides an opinionated framework that will aid you in 
                    designing your Konnect organization and the building of a _Federated APIOps_ delivery process with governance, auditing, 
                    and GitOps based automations. The RP provides tools, examples, best practices, and documentation to guide you in on-boarding with Konnect. 
                    You can choose how to use the components, individually or collectively, to fit your needs and engineering requirements.
                - type: text
                  text: |
                    A suggested path for learning and using the RP is laid out in this document. Start with reading the FAQ section to understand 
                    the RP components and the purpose of them. The individual components are then described in further detail with relevant links to 
                    guide you in understanding how they can be used. You can use pull information from the individual components as needed, however, 
                    if you determine that the full platform is a good fit for your organization, you can then follow the getting started guide which 
                    will help you setting an instance of the RP connected to your organization's Konnect account and code repositories.

  - header:
      type: h2
      text: "Frequently Asked Questions"
    columns:
      - blocks:
          - type: faqs
            config:
              - q: "What are the components of the Reference Platform?"
                a: |
                  * **Documentation**: Including recommended organization and resource design and configuration, FAQs, and and a how-to guides.
                  * **The Konnect Orchestrator**: A software tool which reconciles a declarative configuration to your Konnect organization and manages APIOps 
                    code in a _Platform Team_ repository.
                  * **Kong Air Example Organization**: A complete example of usage of the RP including team structures, service applications, and automated workflows.
                  * **Service Application Team Self Service**: (Coming soon) A self-service portal for developer teams to onboard their own services to the platform.
              - q: "Who can benefit from the Reference Platform?"
                a: "The Reference Platform is designed for platform builders, DevOps engineers, and Service Application teams who are looking to implement a 
                    Federated API Management platform with Konnect."
              - q: "How is automation achieved in the RP?"
                a: "The Reference Platform uses a GitOps-style automation process for API delivery. The Konnect Orchestrator is a tool that can run as a CLI 
                    command or continuous reconciliation loop to apply declarative configurations to your Konnect organizations"

  - header:
      type: h2
      text: "Reference Platform Components"
    columns:
      - blocks:
          - type: card
            config:
              title: Documentation
              description: |
                A complete guide for platform builders to integrate Kong Konnect into their engineering organization and API delivery process.
              icon: /assets/icons/graduation.svg
              cta:
                text: View Documentation
                url: /konnect-reference-platform/documentation/
      - blocks:
          - type: card
            config:
              title: Kong Air Example Organization
              description: |
                Explore KongAirlines, a complete reference implementation showing team structure, service applications, and automated workflows.
              icon: /assets/icons/organization.svg
              cta:
                text: View Kong Air 
                url: /konnect-reference-platform/kong-air/
      - blocks:
          - type: card
            config:
              title: Konnect Orchestrator
              description: |
                A Go-based tool that can run as a CLI command or continuous reconciliation loop to apply declarative configurations to your Konnect organizations.
              icon: /assets/icons/plug.svg
              cta:
                text: View Orchestrator Documentation
                url: /konnect-reference-platform/orchestrator/
      - blocks:
          - type: card
            config:
              title: APIOps Workflows
              description: |
                Implement GitOps-style automation for API delivery with specification governance, diff calculations, and human approval processes.
              icon: /assets/icons/load-balance.svg
              cta:
                text: View APIOps Documentation
                url: /konnect-reference-platform/apiops/

  - header:
      type: h2
      text: "Getting Started"
    columns:
      - blocks:
          - type: structured_text
            config:
              header:
                text: "Implementation Steps"
              blocks:
                - type: ordered_list
                  items:
                    - "Determine Konnect Organization design (single or multiple organizations)"
                    - "Set up Konnect Organizations with proper system accounts"
                    - "Set up a Platform repository for your API delivery process"
                    - "Install and configure koctl (the Konnect Orchestrator CLI tool)"
                    - "Create YAML configurations for platform, teams, and organizations"
                    - "Apply your configuration to start managing resources"

