  - header:
      type: h1
      text: "{{site.ai_gateway}}"
      sub_text: Connectivity and governance layer for modern AI-native applications built on top of {{site.base_gateway}}
  - columns:
      - blocks:
          - type: structured_text
            config:
              header:
                text: "Introducing {{site.ai_gateway}}"
              blocks:
                - type: text
                  text: |
                    As AI adoption accelerates, applications are evolving beyond basic LLM calls into complex, multi-actor systems-including user apps, agents, orchestration layers, and context servers that interact with foundation models in real time.

                    To support this shift, developers are adopting protocols like Model Context Protocol (MCP) and Agent2Agent (A2A) to standardize how components exchange tools, data, and decisions.

                    But infrastructure often falls behind, with challenges around authentication, rate limiting, data security, observability, and constant provider changes.

                    {{site.ai_gateway}} addresses these challenges with a high-performance control plane that secures, governs, and observes AI-native systems end to end. In this model, an [**AI Policy**](/ai-gateway/entities/ai-policy/) {% new_in 2.0 %} is a first-class entity that applies governance behavior at a chosen scope (such as an [AI Model](/ai-gateway/entities/ai-model/), [AI Agent](/ai-gateway/entities/ai-agent/), [AI MCP Server](/ai-gateway/entities/ai-mcp-server/), [AI Consumer](/ai-gateway/entities/ai-consumer/), or [AI Consumer Group](/ai-gateway/entities/ai-consumer-group/)). Whether serving LLM traffic, exposing structured context via MCP, or coordinating agents through A2A, {{site.ai_gateway}} ensures scalable, secure, and reliable AI infrastructure.


      - blocks:
          - type: image
            config:
              url: /assets/images/gateway/ai-gateway-overview.svg
              alt_text: Overview of AI gateway

