  - columns:
      - blocks:
          - type: structured_text
            config:
              header:
                text: "{{site.ai_gateway}} in {{site.konnect_short_name}}"
              blocks:
                - type: text
                  text: |
                    {{site.konnect_short_name}} provides a [unified control plane](https://cloud.konghq.com/ai-manager) to create, manage, and monitor LLMs
                    using the {{site.konnect_short_name}} platform.

                    Key features include:
                    * **Routing and [load balancing](/ai-gateway/load-balancing/)**: Configure [AI Models](/ai-gateway/entities/ai-model/) and `target_models` routing across [AI Providers](/ai-gateway/entities/ai-provider/).
                    * **Streaming and authentication**: Enable streaming responses on [AI Models](/ai-gateway/entities/ai-model/), [AI Agents](/ai-gateway/entities/ai-agent/), and [AI MCP Servers](/ai-gateway/entities/ai-mcp-server/); enforce auth through [AI Policies](/ai-gateway/entities/ai-policy/).
                    * **Access control**: Use [AI Consumers](/ai-gateway/entities/ai-consumer/) and [AI Consumer Groups](/ai-gateway/entities/ai-consumer-group/), plus ACL fields on [AI Models](/ai-gateway/entities/ai-model/), [AI Agents](/ai-gateway/entities/ai-agent/), and [AI MCP Servers](/ai-gateway/entities/ai-mcp-server/).
                    * **Usage analytics**: Monitor request and token volumes, track error rates, and measure average latency with historical comparisons.
                    * **Visual traffic maps**: Explore interactive maps that show how requests flow between clients, entities, and upstreams in real time.

      - blocks:
