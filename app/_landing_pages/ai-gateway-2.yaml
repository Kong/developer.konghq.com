  - header:
      type: h1
      text: "{{site.ai_gateway}}"
      sub_text: Connectivity and governance layer for modern AI-native applications built on top of {{site.base_gateway}}
  - columns:
      - blocks:
          - type: structured_text
            config:
              header:
                text: "Introducing {{site.ai_gateway}}"
              blocks:
                - type: text
                  text: |
                    As AI systems grow from basic LLM calls to complex architectures with agents and tool servers, infrastructure must keep pace with challenges around authentication, governance, and observability. {{site.ai_gateway}} provides a unified control plane that secures and governs all AI traffic through first-class AI Entities and AI Policies.
          - type: structured_text
            config:
              header:
                text: "Get started"
              blocks:
                - type: text
                  text: |
                    [Sign up for {{site.konnect_short_name}}](https://konghq.com/products/kong-konnect/register?utm_medium=referral&utm_source=docs&utm_content=ai-gateway) to get started with {{site.ai_gateway}}.

                    Or, launch a [demo instance](/gateway/quickstart-reference/#ai-gateway-quickstart) of {{site.ai_gateway}} locally with a single command:
                    ```sh
                    curl -Ls https://get.konghq.com/ai | bash
                    ```

                    Or, choose your starting point using one of our quickstart guides:
                    - Proxy an LLM
                    - Expose tools via MCP
                    - Route agents through {{site.ai_gateway}}

      - blocks:
          - type: image
            config:
              url: /assets/images/gateway/ai-gateway-overview.svg
              alt_text: Overview of AI gateway


