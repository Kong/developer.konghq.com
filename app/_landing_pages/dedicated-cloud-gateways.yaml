                  url: /dedicated-cloud-gateways/managed-cache/
      - blocks:
          - type: card
            config:
              title: AWS
              description: |
                Configure a fully-managed Redis service that is provisioned and operated by Kong in AWS ElastiCache.
                Use the managed cache in compatible plugins that use Redis.
              icon: /assets/icons/aws.svg
              ctas:
