rows:
  - header:
      type: h1
      text: "Dedicated Cloud Gateways"

  - columns:
      - blocks:
          - type: structured_text
            config:
              blocks:
                - type: text
                  text: |
                    Dedicated Cloud Gateways are Data Plane nodes that are fully managed by Kong in {{site.konnect_short_name}}. Each Dedicated Cloud Gateway runs on isolated infrastructure within Kong-managed environments in AWS, Azure, or GCP — offering the performance and security of dedicated infrastructure with the operational ease of SaaS.
                    
                    With Dedicated Cloud Gateways, you don't need to host any Data Planes, and you maintain control over the size and location of the Gateway infrastructure. 
                    This allows Kong to autoscale your nodes for you and reduces your operational complexity.

                    Behind the scenes, every {{site.konnect_short_name}} Dedicated Cloud Gateway runs in an individual single-tenant cloud environment, ensuring consistent performance, tenant isolation, and strong security boundaries. The {{site.konnect_short_name}} Control Plane remains multi-tenant.

                    **Benefits of Dedicated Cloud Gateways:**
                    - {{site.konnect_short_name}} handles Gateway upgrades for you.
                    - Choose between public and private networking modes.
                    - Automatic scaling with Autopilot mode.
                    - Support for AWS, Azure, and GCP in multiple [regions](/konnect-platform/geos/).

                    You can manage your Dedicated Cloud Gateway nodes in the [{{site.konnect_short_name}} UI](https://cloud.konghq.com/gateway-manager/).
          - type: button
            config:
              align: left
              text: Create a Dedicated Cloud Gateway
              url: https://cloud.konghq.com/gateway-manager/create-gateway
      - blocks:
          - type: mermaid
            config:
              diagram: |
                flowchart TD
                A(Dedicated Cloud Gateway Control Plane)
                B(Managed Data Plane Node Region 1)
                C(Managed Data Plane Node Region 2)

                subgraph id1 [Konnect]
                A
                end

                A --auto-scale configuration---> B
                A --auto-scale configuration---> C

                style id1 stroke-dasharray:3,rx:10,ry:10

  - header:
      type: h2
      text: "Networking"
    columns:
      - blocks:
          - type: card
            config:
              title: AWS
              description: |
                Dedicated Cloud Gateways support both public and private networking on AWS.
                Private networking provides enhanced security by restricting API exposure.
              icon: /assets/icons/aws.svg
              ctas:
                - text: Transit gateways
                  url: /dedicated-cloud-gateways/transit-gateways/
                - text: VPC peering
                  url: /dedicated-cloud-gateways/aws-vpc-peering/
                - text: AWS resource endpoints (REP)
                  url: /dedicated-cloud-gateways/aws-resource-endpoints/
      - blocks:
          - type: card
            config:
              title: Google Cloud
              description: |
                Dedicated Cloud Gateways support both private DNS and VPC peering for Google Cloud.
              icon: /assets/icons/google-cloud.svg
              ctas:
                - text: VPC peering
                  url: /dedicated-cloud-gateways/gcp-vpc-peering/
      - blocks:
          - type: card
            config:
              title: Azure
              description: |
                {{site.konnect_short_name}} can leverage Azure virtual network peering to create virtual networks, ingest data from your provider's services, and expose them to the internet via {{site.konnect_short_name}}.
              icon: /assets/icons/azure.svg
              ctas:
                - text: VNET peering
                  url: /dedicated-cloud-gateways/azure-peering/
                - text: Virtual WAN (VWAN)
                  url: /dedicated-cloud-gateways/azure-virtual-wan/
  - header:
      type: h2
      text: "Name resolution"
      description: |
        We recommend using private name resolution for services running in the same cloud as your Dedicated Cloud Gateway. 
        Use private hosted zones or private DNS if your services are in the same cloud. 
        Use an outbound DNS resolver if your services are in an external or on-premise DNS server. 
    column_count: 3
    columns:
      - blocks:
          - type: card
            config:
              title: AWS
              icon: /assets/icons/aws.svg
              description: |
                Dedicated Cloud Gateways in AWS support private name resolution through AWS private hosted zones and an outbound DNS resolver.
              ctas:
                - text: Private hosted zones
                  url: /dedicated-cloud-gateways/private-hosted-zones/
                - text: Outbound DNS resolver
                  url: /dedicated-cloud-gateways/outbound-dns-resolver/
      - blocks:
          - type: card
            config:
              title: Google Cloud
              description: |
                Dedicated Cloud Gateways in Google Cloud support private name resolution through Google Cloud private DNS zones.
              icon: /assets/icons/google-cloud.svg
              ctas:
                - text: Private DNS zones
                  url: /dedicated-cloud-gateways/gcp-private-dns/
      - blocks:
          - type: card
            config:
              title: Azure
              description: |
                Dedicated Cloud Gateways in Azure support private name resolution through Azure private DNS zones and an outbound DNS resolver.
              icon: /assets/icons/azure.svg
              ctas:
                - text: VNET peering and private DNS zones
                  url: /dedicated-cloud-gateways/azure-vnet-peering-with-private-dns/
                - text: VNET peering and outbound DNS resolver
                  url: /dedicated-cloud-gateways/azure-vnet-peering-with-outbound-dns-resolver/
                - text: VWAN and private DNS zones
                  url: /dedicated-cloud-gateways/azure-virtual-wan-with-private-dns/
                - text: VWAN and outbound DNS resolver
                  url: /dedicated-cloud-gateways/azure-virtual-wan-with-outbound-dns-resolver/
  - header:
      type: h2
      text: "Managed cache for Redis"
    columns:
      - blocks:
