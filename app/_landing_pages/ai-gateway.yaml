      text: "{{site.ai_gateway}}"
      sub_text: Connectivity and governance layer for modern AI-native applications
  - columns:
      - blocks:
          - type: structured_text
            config:
              header:
                text: "Introducing {{site.ai_gateway}}"
              blocks:
                - type: text
                  text: |
                    As AI systems grow from basic LLM calls to complex architectures with agents and tool servers, infrastructure must keep pace with challenges around authentication, governance, and observability. {{site.ai_gateway}} provides a unified control plane that secures and governs all AI traffic through first-class AI Entities and AI Policies.
          - type: structured_text
            config:
              header:
                text: "Get started"
              blocks:
                - type: text
                  text: |
                    [Sign up for {{site.konnect_short_name}}](https://konghq.com/products/kong-konnect/register?utm_medium=referral&utm_source=docs&utm_content=ai-gateway) to get started with {{site.ai_gateway}} or launch a local demo instance of {{site.ai_gateway}} with a single command:
                    ```sh
                    curl -Ls https://get.konghq.com/ai | bash
                    ```

      - blocks:
