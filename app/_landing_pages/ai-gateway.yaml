        - type: structured_text
          config:
            header:
              text: "Universal API"
            blocks:
              - type: text
                text: |
                  Kong's {{site.ai_gateway}} Universal API is configured through entity resources, primarily [Model](/ai-gateway/entities/model/) and [Provider](/ai-gateway/entities/provider/), to provide a single, standardized interface for interacting with models across multiple providers.

                    - [**Easy to use**](/ai-gateway/entities/model/): Define one Model entity and expose a stable client-facing endpoint.

                    - [**Load balancing**](/ai-gateway/load-balancing/): Distribute requests across target models for performance and cost efficiency.

                    - [**Retry and fallback**](/ai-gateway/load-balancing/#retry-and-fallback): Route requests based on performance, cost, or availability.

                    - [**Policy integration**](/ai-gateway/entities/policy/): Attach Policy entities for auth, guardrails, and transformations.

