  - header:
      text: "Frequently Asked Questions"
      type: h2
    columns:
      - blocks:
        - type: faqs
          config:
            - q: How do I deploy {{site.ai_gateway}}?
              a: |
                {{site.ai_gateway}} is managed through {{site.konnect_short_name}}. Data plane nodes run in your environment (self-hosted, [cloud](/dedicated-cloud-gateways/), or Kubernetes) and connect to {{site.konnect_short_name}} for configuration and observability.

            - q: Why should I use {{site.ai_gateway}} instead of adding the LLM's API behind {{site.base_gateway}}?
              a: |
                If you just add an LLM's API behind {{site.base_gateway}}, you can only interact at the API level with internal traffic.
                With {{site.ai_gateway}} AI Policies and runtime components, {{site.base_gateway}} can understand the prompts that are being sent through the gateway.
                AI Policies can inspect the body and provide more specific AI capabilities to your traffic.
