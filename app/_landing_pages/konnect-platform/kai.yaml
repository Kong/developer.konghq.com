metadata:
  title: "Kong AI assistant (KAi)"
  content_type: landing_page
  description: Learn how to use Kong's AI assistant, KAi.
  products:
    - konnect
  breadcrumbs:
    - /konnect/
  tags:
    - ai
    - mcp

rows:

  - header:
      type: h1
      text: "Kong AI assistant (KAi)"
      sub_text: KAi is Kong's AI assistant that can help you detect issues, suggest fixes, and accelerate your workflows.

  - columns:
      - blocks:
          - type: structured_text
            config:
              blocks:
                - type: text
                  text: |
                    Kong's AI assistant, KAi, can detect issues, suggest fixes, and accelerate your workflows all without leaving the {{site.konnect_short_name}} UI.
                    KAi is enabled by default for {{site.konnect_short_name}} Plus and trial accounts.
                    KAi is always disabled by default for Enterprise accounts.
                    Enterprise accounts can enable KAi by contacting their Kong account manager or [enabling it in {{site.konnect_short_name}} Labs](https://cloud.konghq.com/global/organization/labs).

                    KAi can help you do the following:
                    * **Find information on {{site.konnect_short_name}}:** Ask questions about {{site.konnect_short_name}} features, settings, and configurations.
                    * **Explore gateway entities:** View and explore API gateway entities: Services, Routes, plugins, and more.
                    * **Debug and analyze API traffic:** Get real-time insights and troubleshoot performance bottlenecks and issues.

          - type: button
            config:
              text: "Try KAi in {{site.konnect_short_name}} &rarr;"
              url: https://cloud.konghq.com/global/organization/labs/kai
      - blocks:
          - type: image
            config:
              url: /assets/images/konnect/kai.png
              alt_text: "KAi"

  - header:
      text: "How KAi works"
      type: h2
    columns:
      - blocks:
        - type: structured_text
          config:
            blocks:
              - type: text
                text: |
                  KAi is made up of a series of components running inside {{site.konnect_short_name}}.
                  The agent can perform smart orchestration and analysis of {{site.konnect_short_name}} data and entities.
                  You can interact with the agent in the following ways:
                  * Use the chat in the {{site.konnect_short_name}} UI by clicking **Ask KAi** in the top right.
                  * Click **Analyze with KAi** on an individual trace in the [Debugger](/observability/debugger/) to send the trace summary, spans, and logs directly to KAi.

                  The KAi agent uses backend LLMs for reasoning and natural language tasks.
                  It also uses a {{site.konnect_short_name}} MCP server to provide information about {{site.konnect_short_name}} and the user's entities and data.
                  Because the MCP server is authenticated via the logged-in user's session, it only has access to data and resources that the user has permission to access.

                  KAi also has access to Kong's documentation and support knowledge base, so it can provide guidance on configuration, architecture, and troubleshooting.

                  Like other AI chatbots, KAi uses sessions. KAi can remember context within a session, but doesn't share context between sessions. You can have a maximum of three active sessions with KAi.

      - blocks:
        - type: mermaid
          config:
            diagram: |
              flowchart LR
                subgraph backends["<b>Backends & data sources</b>"]
                  direction LR
                  LLM["LLM backend"]
                  MCP["Konnect MCP Server"]
                  KB["Kong Docs & support <br>knowledge base"]
                end

                subgraph kai["<b>KAi Agent</b>"]
                  direction LR
                  UI["Konnect UI chat"]
                end

                User(("User"))

                User --> kai
                kai --> backends
                click MCP "/konnect-platform/konnect-mcp/"

  - header:
      text: "How to interact with KAi in the UI"
      type: h2
    columns:
      - blocks:
        - type: structured_text
          config:
            blocks:
              - type: text
                text: |
                  To start a chat with KAi, click **Ask KAi** in the top right of the {{site.konnect_short_name}} UI.

                  KAi is context-sensitive, so if you navigate to a control plane or Gateway Service, KAi uses that entity as context when answering questions.
                  We recommend adding context, like your control plane, to get the best possible answers from KAi. 
                  
                  The token context limit for a single chat displays in the bottom right of the chat window, below the submit button.
                  
                  You can create a new session from the **Active sessions** dropdown menu by selecting "New Chat".
                  To delete a session, click the action menu icon next to the session and click **Delete**.
  - header:
      text: "Use the {{site.konnect_short_name}} KodeMode MCP Server with external tools"
      type: h2
    columns:
      - blocks:
        - type: structured_text
          config:
            blocks:
              - type: text
                text: |
                  The same {{site.konnect_short_name}} MCP Server that powers KAi is available for use with external AI assistants and IDE copilots. 
                  This lets you interact with your {{site.konnect_short_name}} resources directly from your development environment.

                  With the MCP server, you can:
                  * Query, create, modify, and delete {{site.konnect_short_name}} entities and configurations
                  * Create and analyze debug sessions for performance issues
                  * Search Kong documentation
                  * Analyze API traffic

                  Admins can disable write tools in KAi and restrict users to read-only queries and docs search. 
                  Write tool usage is enabled by default to allow the broadest range of use cases, but can be disabled in the {{site.konnect_short_name}} [AI Settings page](https://cloud.konghq.com/global/organization/settings/ai-settings).
        - type: button
          config:
            text: "Learn how to configure the MCP server"
            url: /konnect-platform/konnect-mcp/
  - header:
    columns:
      - header:
          type: h2
          text: Artifacts support
        blocks:
        - type: text
          config: |
            KAi supports generating artifacts like decK and kongctl configuration files, Terraform files, Lua custom plugin code, and more.
            Ask KAi to generate an artifact, and it will provide the file for download and copying alongside the chat window.
            For example, you could ask KAi to "Generate a decK file to create a Service with a rate limiting plugin", and KAi returns a decK file that you can download and apply to your control plane.
            
            Artifacts are associated with a session and can be viewed by clicking the artifact's name at the top of the artifacts pane.
            A list of all artifacts in the current session is displayed, and you can click any artifact to view, copy, or download it.

      - header:
          type: h2
          text: What's new in KAi
        blocks:
        - type: text
          config: |
            *KAi v2 Agent released to preview on June 10th, 2026.*

            New features in this release include:
            * Artifacts support
            * Full screen mode
            * MCP KodeMode integration (full {{site.konnect_short_name}} API support)
            * HITL (human-in-the-loop) tool action confirmation
  
  - columns:
      - blocks:
          - type: image
            config:
              url: /assets/images/konnect/kai-artifacts.png
              alt_text: "Screenshot of the KAi artifacts pane in Konnect"

  - header:
      text: "Example prompts"
      type: h2
    column_count: 2
    columns:
      - header:
          type: h3
          text: Debugging & performance
        blocks:
        - type: text
          config: |
            * Why is my `/api/checkout` endpoint slow? Create a debugging session, focusing on high-latency requests, and summarize where time is being spent.
            * Help me diagnose intermittent 502s on my `ROUTE_NAME` Route.
            * What is the plugin execution order for my `ROUTE_NAME` Route?
            * Why are Consumers in `CONSUMER_GROUP` getting 401s? Walk me through likely causes and how to verify them in {{site.konnect_short_name}}. 

      - header:
          type: h3
          text: Configuration
        blocks:
        - type: text
          config: |
            * What plugins affect the `ROUTE_NAME` Route? List them in order and explain what each one does.
            * Build me a decK file showing how to create a Service, Route, and sensible default set of plugins.
            * Show me all rate limiting plugins across production control planes.
            * List all Routes associated with the `SERVICE_NAME` Gateway Service and tell me which auth and security plugins apply to each.
            * How do I create a new CP with Terraform?

      - header:
          type: h3
          text: Security & governance checks
        blocks:
        - type: text
          config: |
            * Audit my `CONTROL_PLANE` control plane for common security misconfigurations (for example: missing auth, weak TLS, or overly broad CORS). Suggest prioritized fixes.
            * Check if any Routes in my `CONTROL_PLANE` control plane expose endpoints without authentication, and list them.
            * Suggest a safe baseline policy set for a public API (rate limiting, authentication, and logging) and show how to apply it to the `SERVICE_NAME` Gateway Service.

      - header:
          type: h3
          text: Questions about {{site.konnect_short_name}}
        blocks:
        - type: text
          config: |
            * How do I set up the plugin `PLUGIN_NAME` in {{site.konnect_short_name}} for a particular use case? Give me the exact steps and the limitations.
            * Explain the difference between a Gateway Service and a Route in {{site.konnect_short_name}}, with an example from my current control plane.
            * What's the recommended way to troubleshoot `upstream timed out` errors in {{site.base_gateway}}?
            * Search the Kong docs for best practices on rate limiting and summarize the key steps for my setup.

  - header:
      text: "Frequently asked questions"
      type: h2
    columns:
      - blocks:
        - type: faqs
          config:
            - q: Is KAi enabled by default?
              a: |
                That depends on your account type.

                * **Plus and trial accounts:** KAi is enabled by default for {{site.konnect_short_name}} Plus and trial accounts. 
                Only organization owners can enable or disable KAi for an organization. 
                
                * **Enterprise accounts:** KAi is always disabled by default for Enterprise accounts. 
                Enterprise accounts can enable it by [enabling it in {{site.konnect_short_name}} Labs](https://cloud.konghq.com/global/organization/labs).
            - q: Does KAi automatically modify {{site.konnect_short_name}} configuration when it finds an issue?
              a: |
                No. KAi can make changes to your {{site.konnect_short_name}} configuration but will always ask for your confirmation before applying any changes.
                You can review the proposed changes and choose whether or not to apply them.
            - q: Can all users see the same resources in KAi?
              a: |
                No. Users can only see the {{site.konnect_short_name}} entities in KAi that they have permission for via [teams and roles](/konnect-platform/teams-and-roles/).
                For example, if a user is a Portal Admin, they can see Dev Portal entities, but asking KAi about control planes will only return generic answers based on the docs. 
                They won't get any information or suggestions related to real control planes, and won't be able to interact with them.
            - q: Is there an additional cost to using KAi?
              a: |
                Access to KAi is included in your existing Plus and Trial plans. 
                Enterprise users should contact their Kong account manager or [enable it in {{site.konnect_short_name}} Labs](https://cloud.konghq.com/global/organization/labs).
            - q: Does KAi train on any of my data?
              a: No. Neither Kong nor any downstream LLMs that KAi uses train on user data.
            - q: Which models does KAi use?
              a: |
                We currently use Anthropic Claude (US/EMEA/AU) and Z.ai GLM-5 (IN), both provided by AWS Bedrock.
                Review the terms for models on the [AWS Third-Party Models page](https://aws.amazon.com/legal/bedrock/third-party-models/).
            - q: What regions is KAi available in?
              a: KAi is currently available in US, EU, AU, and IN. Other regions will be added over time.
            - q: Where can I find my limits and quotas?
              a: |
                Individual chat context information can be found in the bottom right of the chat window, below the submit button.
                Daily user limits can be found at the bottom of the **Active Sessions** list.
                Quotas reset at 5pm each day.
                A warning will appear in the chat window when you're approaching your daily limits.
