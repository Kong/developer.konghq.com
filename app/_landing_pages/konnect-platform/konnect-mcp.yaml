  - columns:
      - blocks:
        - type: structured_text
          config:
            header:
              text: "Available tools"
            blocks:
              - type: text
                text: |
                  The {{site.konnect_product_name}} MCP Server exposes a full suite of tools covering the entire GA {{site.konnect_product_name}} product. It provides three core tools that work together to let your AI assistant discover, understand, and interact with {{site.konnect_product_name}} APIs:

                  * **`search`** — finds relevant API operations based on a description of what you want to do (e.g. `"list all services in a control plane"`).
                  * **`get_schema`** — retrieves the full/partial (as required) schema for a specific operation, so the AI knows exactly what parameters and request body fields are required.
                  * **`execute`** — calls the API operation with the appropriate inputs, based on what `get_schema` returned.

                  Rather than calling a fixed set of individual tools, your AI assistant uses this discover-then-execute pattern to perform complex, multi-step tasks across {{site.konnect_product_name}}. This means the AI reasons over the available operations at runtime and constructs the correct API calls, rather than relying on hardcoded tool definitions for every action.
        - type: structured_text
          config:
            header:
              text: "Usage with skills and plugins"
            blocks:
              - type: text
                text: |
                  The {{site.konnect_product_name}} MCP Server can be installed and used via Plugins and Skills for many existing tools. All the plugins and skills listed on the [Kong Skills Hub](/skills/) are MCP-aware and when installed can use the MCP server to accomplish many tasks more effectively across many {{site.konnect_product_name}} products.

  - header:
      text: "What's new in {{site.konnect_product_name}} MCP Server"
      type: h2
    columns:
      - blocks:
        - type: structured_text
          config:
            blocks:
              - type: text
                text: |
                  The following are the latest changes in {{site.konnect_product_name}} MCP Server:

                  * Standalone MCP {{site.code_mode}} released GA (May 18, 2026)

                  * Public Beta release (December 19, 2025)

                  For a complete changelog of all {{site.konnect_product_name}} MCP Server releases, see the [{{site.konnect_product_name}} MCP Server changelog](/konnect-platform/konnect-mcp/changelog/).
                  
  - header:
        text: "Frequently asked questions"
        type: h2
    columns:
      - blocks:
        - type: faqs
          config:
            - q: Can I disable MCP access for my organization?
              a: |
                MCP server access is enabled by default for all organizations. Organization admins can disable this from [**AI Settings**](https://cloud.konghq.com/global/organization/settings/ai-settings), after which no user will be able to access the MCP server.
            - q: Is any of my data sent to an LLM provider when using the MCP server?
              a: |
                If you have [KAi enabled](https://cloud.konghq.com/global/organization/labs/kai), an additional `KnowledgeBase` tool will be available via the MCP server. This tool creates embeddings from your query and uses a re-ranking model to improve documentation search results. These models are both hosted on AWS Bedrock and no training is performed on your data.
            - q: How does user access control work for MCP tools?
              a: |
                Access to MCP tools is based on the permission levels of the user whose PAT / SPAT is used for authentication.
            - q: I'm experiencing authentication errors. What should I check?
              a: |
                Verify PAT / SPAT validity, check your organization hasn't disabled MCP access, and ensure the token has required permissions.
            - q: I can't connect to the MCP server. What should I do?
              a: |
                Check your internet connection, verify the regional server URL is correct, and ensure your firewall isn't blocking `mcp.konghq.com`.
            - q: Tool execution is failing. How do I troubleshoot?
              a: |
                Check parameter correctness, verify you have resource access permissions, wait if you're rate limited, and confirm the resource exists.