rows:
  - header:
      type: h1
      text: "{{site.konnect_product_name}} MCP Server"
      sub_text: "Interact with {{site.konnect_product_name}} through AI assistants and IDE copilots using the Model Context Protocol (MCP). Access {{site.base_gateway}} entities, debug API performance, and search documentation from your development environment."

  - columns:
      - blocks:
          - type: structured_text
            config:
              blocks:
                - type: text
                  text: |
                    The {{site.konnect_product_name}} MCP Server enables developers to manage API infrastructure and debug performance issues directly from their development environment. You can also plug in {{site.konnect_product_name}} MCP Server to your AI agents to automate tasks like configuration management and performance troubleshooting.

                    The same tools available in {{site.konnect_product_name}} MCP Server power [KAi (Kong's AI assistant)](/konnect-platform/kai/), an in-product AI assistant for {{site.konnect_product_name}}.

          - type: button
            config:
              text: "Get started with {{site.konnect_product_name}} MCP &rarr;"
              url: "/konnect-platform/konnect-mcp/installation/"
      - blocks:
          - type: image
            config:
              url: /assets/images/konnect/konnect-mcp.svg
              alt_text: "{{site.konnect_product_name}} MCP Server"

  - columns:
      - blocks:
        - type: structured_text
          config:
            header:
              text: "Use cases"
            blocks:
              - type: text
                text: |
                  The {{site.konnect_product_name}} MCP Server enables many workflows for managing and debugging your API infrastructure:

                  * **{{site.konnect_product_name}} entity management**: Query control planes, services, routes, consumers, consumer groups, plugins, and vaults.
                  * **API debugging**: Create debug sessions with active tracing to investigate performance issues and identify bottlenecks.
                  * **Analytics and monitoring**: Query API request data with filters for time range, status codes, consumers, services, and routes.
                  * **Kong documentation search**: Search Kong's documentation for configuration guidance and troubleshooting steps.
      - blocks:
        - type: structured_text
          config:
            header:
              text: "When should I use an MCP Server?"
            blocks:
              - type: text
                text: |
                  Use the {{site.konnect_product_name}} MCP Server when:

                  * You want to manage {{site.konnect_short_name}} resources from your IDE or terminal
                  * You need to debug API performance issues with active tracing
                  * You prefer working with AI assistants for infrastructure tasks
                  * You need to query analytics and traffic patterns programmatically

  - header:
      text: "How the {{site.konnect_product_name}} MCP Server works"
      type: h2
    columns:
      - blocks:
        - type: structured_text
          config:
            blocks:
              - type: text
                text: |
                  {{site.konnect_product_name}} MCP Server provides programmatic access to your {{site.konnect_short_name}} resources through the Model Context Protocol. The server exposes specialized tools that AI assistants can use to query {{site.base_gateway}} entities, analyze traffic, debug performance issues, and search documentation.

                  You can connect to the MCP server from:
                  * IDEs with MCP client support (VS Code, Cursor, IntelliJ)
                  * AI assistants like Claude and GitHub Copilot
                  * Claude Code CLI for terminal-based workflows
                  * Any MCP-compatible client application

                  The server connects to {{site.konnect_short_name}} backend services to retrieve {{site.base_gateway}} configuration, analytics data, active tracing sessions, and Kong's documentation. This allows AI assistants to provide contextual assistance for debugging, configuration, and operational tasks.
      - blocks:
        - type: image
          config:
            url: /assets/images/konnect/konnect-mcp-architecture.svg
            alt_text: "Kong Konnect MCP Server architecture diagram showing user environment, MCP server, and backend services"

  - header:
      text: Authentication and access
      type: h2
      sub_text: |
        The {{site.konnect_product_name}} MCP Server uses token-based authentication to ensure secure access to your {{site.konnect_short_name}} resources. You can authenticate using either a Personal Access Token (PAT) or a Service Accout Access Token, depending on your use case.
    columns:
        - blocks:
          - type: structured_text
            config:
              blocks:
                - type: text
                  text: |
                    **Personal Access Token**

                    The MCP server can authenticate using your [Personal Access Token (PAT)](https://cloud.konghq.com/global/account/tokens), which means it only accesses resources you have permission to view. Create a token by opening the [{{site.konnect_product_name}} tokens page](https://cloud.konghq.com/global/account/tokens) and selecting **Generate Token**. All queries respect your organization's role-based access controls and regional data boundaries.
        - blocks:
          - type: structured_text
            config:
              blocks:
                - type: text
                  text: |
                    **System Account Access Token**

                    For automated workflows, you can also use a [System Account Access Token](https://cloud.konghq.com/global/organization/system-accounts/). SPATs are tied to specific service accounts with defined permissions, allowing secure machine-to-machine authentication without user intervention.
  - header:
        text: "Regional server endpoints"
        type: h2
    columns:
        - blocks:
          - type: structured_text
            config:
              blocks:
                - type: text
                  text: |
                    The MCP server is deployed regionally. Connect to the server in the same region where your {{site.konnect_short_name}} resources are deployed.

          - type: table
            config:
              columns:
                - title: Region
                  key: region
                - title: Server URL
                  key: url
              rows:
                - region: United States (US)
                  url: "`https://us.mcp.konghq.com/`"
                - region: Europe (EU)
                  url: "`https://eu.mcp.konghq.com/`"
                - region: Australia (AU)
                  url: "`https://au.mcp.konghq.com/`"
                - region: India (IN)
                  url: "`https://in.mcp.konghq.com/`"
        - blocks:
          - type: structured_text
            config:
              blocks:
                - type: text
                  text: |

                    **Default endpoint**

                    The regional endpoint defaults to **US region**.

                    Organizations using multiple {{site.konnect_product_name}} regions require separate MCP server connections for each region. Resources cannot be accessed across regions from a single connection.

                    **Organization settings**

                    {{site.konnect_product_name}} MCP Server access is **enabled by default**. Organization administrators can disable it from the Organization Settings.

