title: 'MeshIdentity with Spire provider'
description: 'Apply a MeshIdentity policy using the Spire certificate provider to all data plane proxies.'
weight: 920
namespace: kong-mesh-demo
tools:
  - kubernetes
config:
  type: MeshIdentity
  name: identity-spire
  mesh: default
  spec:
    selector:
      dataplane:
        matchLabels: {}
    spiffeID:
      trustDomain: default.us-east.mesh.local
      path: "/ns/{{ .Namespace }}/sa/{{ .ServiceAccount }}"
    provider:
      type: Spire
      spire: {}
