title: 'Minimal bundled MeshIdentity'
tools: 
  - kubernetes
description: 'Apply a MeshIdentity policy with an autogenerated CA to all data plane proxies in the mesh.'
weight: 900
namespace: kong-mesh-demo
config:
  type: MeshIdentity
  name: identity
  mesh: default
  spec:
    selector:
      dataplane:
        matchLabels: {}
    provider:
      type: Bundled
      bundled:
        meshTrustCreation: Disabled
        insecureAllowSelfSigned: true
        autogenerate:
          enabled: true
