title: 'Enable passthrough'
description: 'Enable pasthrough for all sidecars'

weight: 900
tools:
  - kubernetes
  - universal
  - terraform


config:
  type: MeshPassthrough
  name: enable-passthrough
  mesh: default
  spec:
    targetRef:
      kind: Dataplane
      labels:
        app: demo-app
    default:
      passthroughMode: All