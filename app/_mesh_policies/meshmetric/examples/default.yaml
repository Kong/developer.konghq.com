title: 'Metrics default'
description: "A default `MeshMetric` policy for the `default` mesh"

weight: 900

min_version:
  mesh: '2.10'

namespace: kuma-demo
config:
  type: MeshMetric
  mesh: default
  name: metrics-for-mesh-service
  spec:
    targetRef:
      kind: Dataplane
      labels:
        framework: "example-web-framework"
    default:
      applications:
        - path: "/metrics/prometheus"
          port: 8888
      backends:
        - type: Prometheus
          prometheus:
            port: 5670
            path: /metrics