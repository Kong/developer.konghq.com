title: Allow consumer group management

description: Allow the principal to create and delete consumer groups.

extended_description: Allow the principal to create and delete consumer groups.


weight: 900

name: acl_policy
type: acls
config:
  rules:
    - resource_type: group
      action: allow
      operations:
        - name: create
        - name: delete
      resource_names:
        - match: my_resource

tools:
  - konnect-api
  - terraform
