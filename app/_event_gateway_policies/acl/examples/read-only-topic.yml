title: Allow read-only access to a topic

description: Allow the principal to consume messages for a specific topic.

extended_description: Allow the principal to consume messages for a specific topic.


weight: 900

name: acl_policy
type: acls
config:
  rules:
    - resource_type: topic
      action: allow
      operations:
        - name: read
      resource_names:
        - match: my_resource

tools:
  - konnect-api
  - terraform
