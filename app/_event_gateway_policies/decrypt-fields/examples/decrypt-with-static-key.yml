title: Decrypt fields using a static key

description: Decrypt a message field using a static key.


extended_description: |
  Decrypt a message field using a static key.

  The [static key](/event-gateway/entities/static-key/) must be a secret reference to a 256-bit (32-byte) base64-encoded string, or the key itself as a string.
  We recommend using secret references to avoid exposing sensitive data in your configuration.

requirements:
 - "A [static key](/event-gateway/entities/static-key/)."
 - "A corresponding [Encrypt fields policy](/event-gateway/policies/encrypt-fields/examples/encrypt-with-static-key/) that uses the static key.
   Event Gateway uses the key reference in the message payload set by the Encrypt fields policy and looks for the actual key in `key_sources` to successfully decrypt."

weight: 900

type: decrypt_fields
name: decrypt-static-key
config:
  failure_mode: mark
  key_sources:
    - type: static
  decrypt_fields:
    paths:
      - match: personal.ssn

tools:
  - konnect-api
  - terraform
  - kongctl
