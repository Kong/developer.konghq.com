title: Forward via SNI routing
description: |
  Use SNI routing to forward messages from a Kafka client to a virtual cluster.
  
  Example hostnames generated with this configuration:
  * `bootstrap.my-virtual-cluster.example.mycompany.com`
  * `broker-1.my-virtual-cluster.example.mycompany.com`

weight: 900

name: forward
type: forward_to_virtual_cluster
config:
  type: sni
  sni_suffix: .example.mycompany.com
  advertised_port: 19095
  broker_host_format:
    type: per_cluster_suffix

tools:
  - konnect-api
  - terraform
