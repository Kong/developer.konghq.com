---
# Kong Air demo apps for scenario testing
# Uses nginx:alpine as a simple HTTP echo server for all three services.
# Each service has its own ServiceAccount so SPIFFE identities are distinct.
apiVersion: v1
kind: Namespace
metadata:
  name: kong-air-production
  labels:
    kuma.io/sidecar-injection: enabled
    kuma.io/mesh: kong-air-mesh
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: passenger-portal
  namespace: kong-air-production
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: check-in-api
  namespace: kong-air-production
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flight-control
  namespace: kong-air-production
---
# ConfigMap with a simple nginx config that reports the pod name and upstream calls
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-passthrough
  namespace: kong-air-production
data:
  default.conf: |
    server {
        listen 8080;
        location / {
            add_header Content-Type text/plain;
            return 200 "$hostname\n";
        }
        location /health {
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }
    }
---
# passenger-portal
apiVersion: apps/v1
kind: Deployment
metadata:
  name: passenger-portal
  namespace: kong-air-production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: passenger-portal
      version: v1
  template:
    metadata:
      labels:
        app: passenger-portal
        version: v1
    spec:
      serviceAccountName: passenger-portal
      containers:
        - name: passenger-portal
          image: nginx:alpine
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-passthrough
---
apiVersion: v1
kind: Service
metadata:
  name: passenger-portal
  namespace: kong-air-production
spec:
  selector:
    app: passenger-portal
  ports:
    - port: 8080
      targetPort: 8080
      name: http
      appProtocol: http
---
# check-in-api
apiVersion: apps/v1
kind: Deployment
metadata:
  name: check-in-api
  namespace: kong-air-production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: check-in-api
      version: v1
  template:
    metadata:
      labels:
        app: check-in-api
        version: v1
    spec:
      serviceAccountName: check-in-api
      containers:
        - name: check-in-api
          image: nginx:alpine
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-passthrough
---
apiVersion: v1
kind: Service
metadata:
  name: check-in-api
  namespace: kong-air-production
spec:
  selector:
    app: check-in-api
  ports:
    - port: 8080
      targetPort: 8080
      name: http
      appProtocol: http
---
# flight-control
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight-control
  namespace: kong-air-production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flight-control
      version: v1
  template:
    metadata:
      labels:
        app: flight-control
        version: v1
    spec:
      serviceAccountName: flight-control
      containers:
        - name: flight-control
          image: nginx:alpine
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-passthrough
---
apiVersion: v1
kind: Service
metadata:
  name: flight-control
  namespace: kong-air-production
spec:
  selector:
    app: flight-control
  ports:
    - port: 8080
      targetPort: 8080
      name: http
      appProtocol: http
